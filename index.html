          comfy: { id: 'comfy', title: 'CuteUI', icon: '🪄', component: AppComfyUI, width: 650, height: 450 },
          taskmgr: { id: 'taskmgr', title: '工作管理員', icon: '📈', component: AppTaskManager, width: 750, height: 500 },
          cutehub: { id: 'cutehub', title: 'Cute Hub', icon: '🟧', component: AppCuteHub, width: 600, height: 450 },
          cute3d: { id: 'cute3d', title: 'Cute3D', icon: '🧊', component: AppCute3D, width: 550, height: 400 },
          browser: { id: 'browser', title: '瀏覽器', icon: '🌐', component: AppBrowser, width: 700, height: 500 },
          cutecut: { id: 'cutecut', title: 'CuteCut', icon: '✂️', component: AppCuteCut, width: 700, height: 550 },
          cutetorrent: { id: 'cutetorrent', title: 'CuteTorrent', icon: '🧲', component: AppCuteTorrent, width: 650, height: 450 },
          cuteai: { id: 'cuteai', title: 'CuteAI', icon: '✨', component: AppCuteAI, width: 600, height: 550 },
          cutechat: { id: 'cutechat', title: 'CuteChat', icon: '💬', component: AppCuteChat, width: 600, height: 500 },
          cuteminer: { id: 'cuteminer', title: 'CuteMiner', icon: '⛏️', component: AppCuteMiner, width: 600, height: 400 },
          cutebrush: { id: 'cutebrush', title: 'CuteBrush', icon: '🖌️', component: AppCuteBrush, width: 750, height: 550 },
          // 資源回收桶 (透過 bottomRight: true 指定放在右下角)
          recyclebin: { id: 'recyclebin', title: '資源回收桶', icon: '🗑️', component: AppRecycleBin, width: 600, height: 450, bottomRight: true },
          // 隱藏的 App，不會顯示在桌面和開始選單
          bunnyplayer: { id: 'bunnyplayer', title: '可愛播放器', icon: '▶️', component: AppBunnyPlayer, width: 400, height: 300, hidden: true },
        };

        // --- 視窗元件 ---
        const Window = ({ win, app, onClose, onFocus, onUpdatePos, isFocused }) => {
          const [isDragging, setIsDragging] = React.useState(false);
          const [rel, setRel] = React.useState({ x: 0, y: 0 });
          const [isMaximized, setIsMaximized] = React.useState(false);

          const onPointerDown = (e) => {
            if (e.target.closest('.window-controls')) return;
            onFocus(win.id);
            setIsDragging(true);
            setRel({ x: e.clientX - win.x, y: e.clientY - win.y });
            e.currentTarget.setPointerCapture(e.pointerId);
          };

          const onPointerMove = (e) => {
            if (!isDragging || isMaximized) return;
            onUpdatePos(win.id, { x: e.clientX - rel.x, y: e.clientY - rel.y });
          };

          const onPointerUp = (e) => {
            setIsDragging(false);
            e.currentTarget.releasePointerCapture(e.pointerId);
          };

          const AppContent = app.component;

          return (
            <div
              className={`absolute flex flex-col bg-white/80 dark:bg-slate-800/80 backdrop-blur-md rounded-2xl shadow-2xl border ${isFocused ? 'border-pink-300 dark:border-pink-500 shadow-pink-200/50 dark:shadow-pink-900/50' : 'border-white/50 dark:border-slate-600/50'} overflow-hidden transition-all duration-200`}
              style={{
                left: isMaximized ? 0 : win.x,
                top: isMaximized ? 0 : win.y,
                width: isMaximized ? '100%' : app.width,
                height: isMaximized ? 'calc(100% - 3.5rem)' : app.height,
                zIndex: win.zIndex,
                display: win.minimized ? 'none' : 'flex'
              }}
              onClick={() => onFocus(win.id)}
            >
              <div 
                className="h-10 bg-gradient-to-r from-white/60 to-white/30 dark:from-slate-700/60 dark:to-slate-700/30 border-b border-white/40 dark:border-slate-600/50 flex items-center justify-between px-3 cursor-move select-none transition-colors"
                onPointerDown={onPointerDown}
                onPointerMove={onPointerMove}
                onPointerUp={onPointerUp}
                onDoubleClick={() => setIsMaximized(!isMaximized)}
              >
                <div className="flex items-center gap-2">
                  <div className="w-6 h-6 flex items-center justify-center text-lg">{app.icon}</div>
                  <span className="text-sm font-bold text-gray-700 dark:text-gray-200">{app.title}</span>
                </div>
                <div className="flex items-center gap-2 window-controls">
                  <button onClick={(e) => { e.stopPropagation(); toggleMinimize(win.id); }} className="w-6 h-6 flex items-center justify-center rounded-full hover:bg-gray-200/50 dark:hover:bg-slate-600 text-gray-600 dark:text-gray-300 transition-colors">
                    <IconMinus size={14} />
                  </button>
                  <button onClick={(e) => { e.stopPropagation(); setIsMaximized(!isMaximized); }} className="w-6 h-6 flex items-center justify-center rounded-full hover:bg-gray-200/50 dark:hover:bg-slate-600 text-gray-600 dark:text-gray-300 transition-colors">
                    <IconSquare size={12} />
                  </button>
                  <button onClick={(e) => { e.stopPropagation(); onClose(win.id); }} className="w-6 h-6 flex items-center justify-center rounded-full hover:bg-red-400 dark:hover:bg-red-500 hover:text-white text-gray-600 dark:text-gray-300 transition-colors">
                    <IconX size={14} />
                  </button>
                </div>
              </div>
              <div className="flex-1 overflow-hidden relative">
                <AppContent />
              </div>
            </div>
          );
        };

        // --- 主系統 ---
        const CuteOS = () => {
          // 修改：將初始狀態設定為 'welcome'，跳過 'bios' 和 'dos'
          const [bootPhase, setBootPhase] = React.useState('welcome'); 
          const [showPowerMenu, setShowPowerMenu] = React.useState(false);
          const [windows, setWindows] = React.useState([]);
          const [zIndexCounter, setZIndexCounter] = React.useState(10);
          const [startOpen, setStartOpen] = React.useState(false);
          const [time, setTime] = React.useState(new Date());
          const [isDarkMode, setIsDarkMode] = React.useState(false);
          const [notifications, setNotifications] = React.useState([]);
          const [wallpaper, setWallpaper] = React.useState('default'); // 新增桌布狀態
          const [contextMenu, setContextMenu] = React.useState({ show: false, x: 0, y: 0 }); // 新增右鍵選單狀態

          // 監聽藍白畫面與系統通知事件
          useEffect(() => {
            const handleBSOD = () => setBootPhase('bsod');
            const handleNotify = (e) => {
               const newNotif = { id: Date.now(), ...e.detail };
               setNotifications(prev => [...prev, newNotif]);
               // 7秒後自動移除通知
               setTimeout(() => {
                  setNotifications(prev => prev.filter(n => n.id !== newNotif.id));
               }, 7000);
            };
            window.addEventListener('os-bsod', handleBSOD);
            window.addEventListener('os-notify', handleNotify);
            return () => {
               window.removeEventListener('os-bsod', handleBSOD);
               window.removeEventListener('os-notify', handleNotify);
            }
          }, []);

          // 開機倒數邏輯 與 惡搞背景事件 (老闆查勤)
          useEffect(() => {
            if (bootPhase === 'shutdown') {
              const timer = setTimeout(() => setBootPhase('bios'), 3000);
              return () => clearTimeout(timer);
            }
            if (bootPhase === 'bios') {
              const timer = setTimeout(() => setBootPhase('dos'), 4000); // 這裡保留 BIOS 的 4 秒，讓重開機還是有完整流程
              return () => clearTimeout(timer);
            }
            if (bootPhase === 'welcome') {
              const timer = setTimeout(() => setBootPhase('os'), 2500);
              return () => clearTimeout(timer);
            }
            if (bootPhase === 'bsod') {
              setWindows([]); // 清空所有視窗
              setStartOpen(false);
              const timer = setTimeout(() => setBootPhase('shutdown'), 4500); 
              return () => clearTimeout(timer);
            }
            
            // 進入桌面後，啟動背景事件：老闆 10 秒後出擊！
            if (bootPhase === 'os') {
               const bossTimer = setTimeout(() => {
                  const attackMsg = '人呢？？那個專案進度怎樣了？老闆在等！！😡';
                  globalChatState.boss.messages.push({ id: Date.now(), sender: 'them', text: attackMsg });
                  globalChatState.boss.unread += 1;
                  
                  // 發送通知
                  window.dispatchEvent(new CustomEvent('os-notify', {
                    detail: { title: '老闆 💼 (CuteChat)', message: attackMsg, action: 'open_chat', chatId: 'boss' }
                  }));
                  // 觸發聊天室重繪
                  window.dispatchEvent(new Event('chat-updated'));
               }, 10000);

               const friendTimer = setTimeout(() => {
                  const friendMsg = '快點看這個 🐰🥕 超好笑 www';
                  globalChatState.friend.messages.push({ id: Date.now(), sender: 'them', text: friendMsg });
                  globalChatState.friend.unread += 1;
                  
                  window.dispatchEvent(new CustomEvent('os-notify', {
                    detail: { title: '八卦仔 🐰 (CuteChat)', message: friendMsg, action: 'open_chat', chatId: 'friend' }
                  }));
                  window.dispatchEvent(new Event('chat-updated'));
               }, 25000);

               return () => { clearTimeout(bossTimer); clearTimeout(friendTimer); };
            }
          }, [bootPhase]);

          const handleRestart = () => {
            setBootPhase('shutdown');
            setWindows([]);
            setStartOpen(false);
            setShowPowerMenu(false);
          };

          useEffect(() => {
            const timer = setInterval(() => setTime(new Date()), 60000);
            return () => clearInterval(timer);
          }, []);

          const openApp = (appId) => {
            setStartOpen(false);
            const existingWin = windows.find(w => w.appId === appId);
            if (existingWin) {
              focusWindow(existingWin.id);
              if (existingWin.minimized) {
                setWindows(windows.map(w => w.id === existingWin.id ? { ...w, minimized: false } : w));
              }
              return;
            }

            const newZ = zIndexCounter + 1;
            setZIndexCounter(newZ);
            const offset = (windows.length % 5) * 30;
            // 讓視窗不會超出邊界太多
            const startX = Math.min(50 + offset, window.innerWidth - 300);
            const startY = Math.min(50 + offset, window.innerHeight - 300);

            setWindows([...windows, {
              id: `win_${Date.now()}`,
              appId,
              x: startX,
              y: startY,
              zIndex: newZ,
              minimized: false
            }]);
          };

          const closeWindow = (id) => {
            setWindows(windows.filter(w => w.id !== id));
          };

          const focusWindow = (id) => {
            const newZ = zIndexCounter + 1;
            setZIndexCounter(newZ);
            setWindows(windows.map(w => w.id === id ? { ...w, zIndex: newZ } : w));
          };

          const updateWindowPos = (id, pos) => {
            setWindows(windows.map(w => w.id === id ? { ...w, x: pos.x, y: pos.y } : w));
          };

          const toggleMinimize = (id) => {
            setWindows(windows.map(w => w.id === id ? { ...w, minimized: !w.minimized } : w));
            if (!windows.find(w => w.id === id).minimized) {
              focusWindow(id);
            }
          };

          // 處理通知點擊事件
          const handleNotificationClick = (n) => {
             if (n.action === 'play_bunny') {
                 openApp('bunnyplayer');
             } else if (n.action === 'open_chat') {
                 openApp('cutechat');
                 // 告訴 CuteChat 要切換到哪個聊天對象
                 if (n.chatId) {
                     setTimeout(() => window.dispatchEvent(new CustomEvent('chat-open-id', { detail: n.chatId })), 100);
                 }
             }
             // 點擊後立即移除該通知
             setNotifications(prev => prev.filter(x => x.id !== n.id));
          };

          const highestZIndex = Math.max(...windows.map(w => w.zIndex), 0);

          // 桌布主題 CSS 設定 (更新 win11 的底色，並用元件渲染漸層布料)
          const WALLPAPERS = {
            default: "bg-gradient-to-br from-indigo-100 via-purple-100 to-pink-100 dark:from-slate-900 dark:via-indigo-950 dark:to-fuchsia-950",
            win11: "bg-[#e0f2fe] dark:bg-[#020617]", 
            mint: "bg-gradient-to-tr from-green-50 via-emerald-100 to-teal-100 dark:from-slate-900 dark:via-teal-950 dark:to-emerald-950",
            xp: "bg-blue-300 dark:bg-slate-900" // 給 XP 一個底色，上面會覆蓋 SVG
          };

          return (
            <div className={isDarkMode ? 'dark' : ''}>
              {bootPhase === 'bios' && <BiosScreen onEnterSetup={() => setBootPhase('bios-setup')} onContinue={() => setBootPhase('dos')} />}
              {bootPhase === 'bios-setup' && <BiosSetupScreen onExit={() => setBootPhase('dos')} />}
              {bootPhase === 'dos' && <DosScreen onComplete={() => setBootPhase('welcome')} />}
              {bootPhase === 'welcome' && <WelcomeScreen isDarkMode={isDarkMode} />}
              {bootPhase === 'shutdown' && <ShutdownScreen isDarkMode={isDarkMode} />}
              {bootPhase === 'bsod' && <BSODScreen />}
              
              {bootPhase === 'os' && (
                <div className={`w-full h-screen overflow-hidden ${WALLPAPERS[wallpaper]} relative font-sans select-none flex flex-col transition-all duration-700`}>
                  
                  {/* 渲染呆萌 Win11 SVG 桌布 */}
                  {wallpaper === 'win11' && <DerpyWin11Wallpaper isDark={isDarkMode} />}
                  {/* 渲染經典草地 XP SVG 桌布 */}
                  {wallpaper === 'xp' && <DerpyXPWallpaper isDark={isDarkMode} />}

                  <div 
                    className="flex-1 relative p-4 z-10" 
                    onClick={() => { setStartOpen(false); setShowPowerMenu(false); setContextMenu({ ...contextMenu, show: false }); }}
                    onContextMenu={(e) => {
                      e.preventDefault();
                      setStartOpen(false);
                      setShowPowerMenu(false);
                      let x = e.clientX;
                      let y = e.clientY;
                      // 邊界偵測避免選單跑出螢幕外
                      if (x + 208 > window.innerWidth) x = window.innerWidth - 208;
                      if (y + 160 > window.innerHeight) y = window.innerHeight - 160;
                      setContextMenu({ show: true, x, y });
                    }}
                  >
                    <div className="absolute inset-4 flex flex-col gap-4 flex-wrap content-start z-0">
                      {/* 一般桌面圖示 (過濾掉隱藏與設定在右下角的圖示) */}
                      {Object.values(APPS).filter(app => !app.hidden && !app.bottomRight).map(app => (
                        <button 
                          key={app.id} 
                          onDoubleClick={() => openApp(app.id)}
                          onClick={() => openApp(app.id)} 
                          className="w-20 p-2 flex flex-col items-center gap-2 rounded-xl hover:bg-white/30 dark:hover:bg-slate-800/50 transition-colors group"
                        >
                          <div className="w-12 h-12 bg-white/60 dark:bg-slate-800/60 backdrop-blur-sm rounded-2xl shadow-sm flex items-center justify-center group-hover:scale-105 transition-all text-2xl border border-transparent dark:border-slate-700/50">
                            {app.icon}
                          </div>
                          <span className="text-xs font-bold text-gray-700 dark:text-gray-200 text-center drop-shadow-sm transition-colors">{app.title}</span>
                        </button>
                      ))}
                    </div>

                    {/* 右下角獨立圖示區 (資源回收桶) */}
                    <div className="absolute bottom-4 right-4 flex flex-col gap-4 z-0">
                      {Object.values(APPS).filter(app => app.bottomRight).map(app => (
                        <button 
                          key={app.id} 
                          onDoubleClick={() => openApp(app.id)}
                          onClick={() => openApp(app.id)} 
                          className="w-20 p-2 flex flex-col items-center gap-2 rounded-xl hover:bg-white/30 dark:hover:bg-slate-800/50 transition-colors group"
                        >
                          <div className="w-12 h-12 bg-white/60 dark:bg-slate-800/60 backdrop-blur-sm rounded-2xl shadow-sm flex items-center justify-center group-hover:scale-105 transition-all text-2xl border border-transparent dark:border-slate-700/50">
                            {app.icon}
                          </div>
                          <span className="text-xs font-bold text-gray-700 dark:text-gray-200 text-center drop-shadow-sm transition-colors">{app.title}</span>
                        </button>
                      ))}
                    </div>

                    {windows.map(win => (
                      <Window 
                        key={win.id} 
                        win={win} 
                        app={APPS[win.appId]}
                        onClose={closeWindow}
                        onFocus={focusWindow}
                        onUpdatePos={updateWindowPos}
                        isFocused={win.zIndex === highestZIndex && !win.minimized}
                      />
                    ))}

                    {/* 桌布右鍵選單 */}
                    {contextMenu.show && (
                      <div 
                        className="absolute bg-white/95 dark:bg-slate-800/95 backdrop-blur-xl border border-gray-200 dark:border-slate-700 shadow-2xl rounded-xl py-2 w-52 z-[100] animate-in fade-in zoom-in-95 duration-100"
                        style={{ left: contextMenu.x, top: contextMenu.y }}
                        onClick={e => e.stopPropagation()}
                      >
                        <div className="px-4 py-1.5 text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-wider">個人化設定</div>
                        <button 
                          className="w-full text-left px-4 py-2.5 text-sm text-gray-700 dark:text-gray-200 hover:bg-pink-50 dark:hover:bg-slate-700 flex items-center gap-3 transition-colors" 
                          onClick={() => { setWallpaper('default'); setContextMenu({...contextMenu, show: false}); }}
                        >
                          <div className={`w-4 h-4 rounded-full bg-gradient-to-br from-indigo-100 to-pink-200 ${wallpaper === 'default' ? 'ring-2 ring-pink-400 ring-offset-2 dark:ring-offset-slate-800' : ''}`}></div> 
                          <span className={wallpaper === 'default' ? 'font-bold text-pink-500 dark:text-pink-400' : ''}>預設粉嫩</span>
                        </button>
                        <button 
                          className="w-full text-left px-4 py-2.5 text-sm text-gray-700 dark:text-gray-200 hover:bg-blue-50 dark:hover:bg-slate-700 flex items-center gap-3 transition-colors" 
                          onClick={() => { setWallpaper('win11'); setContextMenu({...contextMenu, show: false}); }}
                        >
                          <div className={`w-4 h-4 rounded-full bg-gradient-to-br from-blue-200 to-indigo-300 ${wallpaper === 'win11' ? 'ring-2 ring-blue-400 ring-offset-2 dark:ring-offset-slate-800' : ''}`}></div> 
                          <span className={wallpaper === 'win11' ? 'font-bold text-blue-500 dark:text-blue-400' : ''}>蔚藍綻放 (Win11)</span>
                        </button>
                        <button 
                          className="w-full text-left px-4 py-2.5 text-sm text-gray-700 dark:text-gray-200 hover:bg-green-50 dark:hover:bg-slate-700 flex items-center gap-3 transition-colors" 
                          onClick={() => { setWallpaper('mint'); setContextMenu({...contextMenu, show: false}); }}
                        >
                          <div className={`w-4 h-4 rounded-full bg-gradient-to-br from-teal-200 to-emerald-200 ${wallpaper === 'mint' ? 'ring-2 ring-teal-400 ring-offset-2 dark:ring-offset-slate-800' : ''}`}></div> 
                          <span className={wallpaper === 'mint' ? 'font-bold text-teal-500 dark:text-teal-400' : ''}>清新薄荷</span>
                        </button>
                        <button 
                          className="w-full text-left px-4 py-2.5 text-sm text-gray-700 dark:text-gray-200 hover:bg-green-50 dark:hover:bg-slate-700 flex items-center gap-3 transition-colors border-t border-gray-100 dark:border-slate-700 mt-1 pt-3" 
                          onClick={() => { setWallpaper('xp'); setContextMenu({...contextMenu, show: false}); }}
                        >
                          <div className={`w-4 h-4 rounded-full bg-gradient-to-b from-blue-400 to-green-400 ${wallpaper === 'xp' ? 'ring-2 ring-green-500 ring-offset-2 dark:ring-offset-slate-800' : ''}`}></div> 
                          <span className={wallpaper === 'xp' ? 'font-bold text-green-600 dark:text-green-500' : ''}>經典草地 (XP)</span>
                        </button>
                      </div>
                    )}

                    {/* 系統通知渲染區 (為了不擋住資源回收桶，稍微往上移到 bottom-28) */}
                    <div className="absolute bottom-28 right-4 flex flex-col gap-3 z-50 pointer-events-none">
                       {notifications.map(n => (
                         <div 
                           key={n.id} 
                           onClick={() => handleNotificationClick(n)}
                           className="bg-white/90 dark:bg-slate-800/90 backdrop-blur border border-pink-200 dark:border-slate-600 p-4 rounded-xl shadow-2xl pointer-events-auto cursor-pointer hover:scale-105 transition-transform flex gap-3 items-center animate-[slideIn_0.3s_ease-out] w-72"
                         >
                           <div className="text-2xl shrink-0">✨</div>
                           <div className="overflow-hidden">
                             <div className="font-bold text-sm text-gray-800 dark:text-gray-200 truncate">{n.title}</div>
                             <div className="text-xs text-gray-600 dark:text-gray-400 mt-1 line-clamp-2">{n.message}</div>
                           </div>
                         </div>
                       ))}
                    </div>
                  </div>

                  {startOpen && (
                    <div className="absolute bottom-16 left-4 w-64 bg-white/90 dark:bg-slate-800/90 backdrop-blur-xl rounded-2xl shadow-2xl border border-white/50 dark:border-slate-700 p-4 z-50 animate-in fade-in duration-200 transition-colors">
                      <div className="flex items-center gap-3 mb-6 pb-4 border-b border-gray-100 dark:border-slate-700">
                        <div className="w-10 h-10 bg-pink-100 dark:bg-slate-700 rounded-full flex items-center justify-center text-xl shadow-sm transition-colors">
                          🐰
                        </div>
                        <div>
                          <div className="font-bold text-gray-700 dark:text-gray-200">小主人</div>
                          <div className="text-xs text-gray-400 dark:text-gray-400">可愛每一天 ✨</div>
                        </div>
                      </div>
                      <div className="space-y-1 max-h-64 overflow-y-auto pr-1">
                        {/* 開始選單也只顯示沒有隱藏的 App (過濾掉右下角特權圖示) */}
                        {Object.values(APPS).filter(app => !app.hidden && !app.bottomRight).map(app => (
                          <button 
                            key={app.id} 
                            onClick={() => openApp(app.id)}
                            className="w-full flex items-center gap-3 p-2 rounded-xl hover:bg-pink-50 dark:hover:bg-slate-700 transition-colors text-left"
                          >
                            <div className="w-8 h-8 bg-white dark:bg-slate-600 rounded-lg shadow-sm flex items-center justify-center text-lg transition-colors shrink-0">
                              {app.icon}
                            </div>
                            <span className="text-sm font-bold text-gray-600 dark:text-gray-200 truncate">{app.title}</span>
                          </button>
                        ))}
                      </div>
                      <div className="mt-4 pt-4 border-t border-gray-100 dark:border-slate-700 flex justify-between relative transition-colors items-center">
                        <button 
                          onClick={(e) => { e.stopPropagation(); setIsDarkMode(!isDarkMode); }}
                          className="p-2 rounded-full hover:bg-indigo-50 dark:hover:bg-slate-700 text-indigo-400 dark:text-yellow-400 transition-colors" 
                          title="切換深色/淺色模式"
                        >
                          {isDarkMode ? <IconSun size={18} /> : <IconMoon size={18} />}
                        </button>

                        <div className="flex relative">
                          {showPowerMenu && (
                            <div className="absolute bottom-12 right-0 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 shadow-xl rounded-xl p-2 z-50 transition-colors">
                              <button 
                                onClick={handleRestart}
                                className="flex items-center gap-2 px-4 py-2 hover:bg-red-50 dark:hover:bg-slate-700 text-red-500 dark:text-red-400 rounded-lg transition-colors whitespace-nowrap text-sm font-bold"
                              >
                                <IconRotateCw size={16} />
                                重新啟動
                              </button>
                            </div>
                          )}
                          <button 
                            onClick={(e) => { e.stopPropagation(); setShowPowerMenu(!showPowerMenu); }}
                            className="p-2 rounded-full hover:bg-red-50 dark:hover:bg-slate-700 text-red-400 transition-colors" 
                            title="電源"
                          >
                            <IconPower size={18} />
                          </button>
                        </div>
                      </div>
                    </div>
                  )}

                  <div className="h-14 bg-white/60 dark:bg-slate-900/60 backdrop-blur-xl border-t border-white/50 dark:border-slate-800 flex items-center px-4 justify-between z-40 relative shadow-[0_-4px_20px_rgba(0,0,0,0.05)] transition-colors">
                    <div className="flex items-center gap-2 overflow-x-auto overflow-y-hidden no-scrollbar pr-2">
                      <button 
                        onClick={(e) => { e.stopPropagation(); setStartOpen(!startOpen); setShowPowerMenu(false); }}
                        className={`flex-shrink-0 w-10 h-10 rounded-xl flex items-center justify-center transition-all ${startOpen ? 'bg-pink-200 dark:bg-slate-700 text-pink-700 dark:text-pink-300 shadow-inner' : 'bg-white dark:bg-slate-800 text-pink-500 dark:text-pink-400 hover:bg-pink-50 dark:hover:bg-slate-700 shadow-sm hover:-translate-y-0.5'}`}
                      >
                        <IconMenu size={20} />
                      </button>

                      <div className="flex items-center gap-2 ml-4">
                        {windows.map(win => {
                          const app = APPS[win.appId];
                          const isActive = win.zIndex === highestZIndex && !win.minimized;
                          return (
                            <button
                              key={win.id}
                              onClick={() => toggleMinimize(win.id)}
                              className={`flex-shrink-0 flex items-center gap-2 px-3 py-1.5 rounded-xl transition-all max-w-[120px] ${isActive ? 'bg-white dark:bg-slate-700 shadow-md text-pink-600 dark:text-pink-300 scale-100' : 'bg-white/40 dark:bg-slate-800/60 text-gray-600 dark:text-gray-400 hover:bg-white/60 dark:hover:bg-slate-700/80 scale-95'}`}
                            >
                              <div className="w-5 h-5 flex-shrink-0 flex items-center justify-center text-sm">
                                 <span className={isActive ? '' : 'grayscale opacity-70'}>{app.icon}</span>
                              </div>
                              <span className="text-sm font-bold truncate">{app.title}</span>
                              {isActive && <div className="absolute -bottom-1 left-1/2 -translate-x-1/2 w-3 h-1 bg-pink-400 rounded-full" />}
                            </button>
                          );
                        })}
                      </div>
                    </div>

                    <div className="flex-shrink-0 flex items-center gap-3 px-3 py-1.5 bg-white/50 dark:bg-slate-800/80 rounded-xl shadow-sm text-gray-600 dark:text-gray-300 text-sm font-bold ml-2 transition-colors">
                      <IconClock size={16} className="text-pink-400 hidden sm:block" />
                      {time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                    </div>
                  </div>

                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CuteOS />);
    </script>
</body>
</html>
