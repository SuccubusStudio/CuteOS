<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuteOS</title>
    
    <!-- 引入 Tailwind CSS (負責排版和美美的顏色) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 配置 Tailwind 支援手動切換深色模式 -->
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <!-- 引入 React 核心庫 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel (讓瀏覽器能看得懂 JSX 語法) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 新增：引入真正的 3D 渲染引擎 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        /* 自訂滾動條讓它更可愛 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #64748b; }
        ::-webkit-scrollbar-thumb:hover { background: #f472b6; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Cut Hub / CuteCut / Bunny 專用動畫 */
        @keyframes wiggle {
            0%, 100% { transform: rotate(-20deg); }
            50% { transform: rotate(20deg); }
        }
        .animate-wiggle { animation: wiggle 0.2s ease-in-out infinite; }
        
        @keyframes eat {
            0%, 100% { transform: scale(1) translateX(0); }
            50% { transform: scale(1.1) translateX(10px); }
        }
        .animate-eat { animation: eat 0.3s ease-in-out infinite; }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 內建圖標 (取代外部套件，確保本地執行沒問題) ---
        const IconStar = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>;
        const IconX = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const IconMinus = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconSquare = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>;
        const IconMenu = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>;
        const IconPower = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>;
        const IconClock = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const IconRotateCw = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>;
        const IconMoon = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>;
        const IconSun = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>;
        const IconLoader = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;

        // --- 全域通訊軟體狀態 (讓訊息在 App 關閉時也能保存) ---
        let globalChatState = {
          boss: {
            id: 'boss',
            name: '老闆 💼',
            avatar: '👨‍💼',
            unread: 0,
            messages: []
          },
          friend: {
            id: 'friend',
            name: '八卦仔 🐰',
            avatar: '🐰',
            unread: 0,
            messages: []
          }
        };

        // --- 開機畫面 (Boot Sequence) ---
        const BiosScreen = ({ onEnterSetup, onContinue }) => {
          useEffect(() => {
            const timer = setTimeout(onContinue, 4000); // 開機畫面等久一點 (4秒)
            const handleKeyDown = (e) => {
              if (e.key === 'Delete' || e.key === 'Del') {
                clearTimeout(timer);
                onEnterSetup();
              }
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => {
              clearTimeout(timer);
              window.removeEventListener('keydown', handleKeyDown);
            };
          }, [onEnterSetup, onContinue]);

          return (
            <div 
              className="w-full h-screen bg-black text-white flex flex-col items-center justify-center font-mono select-none relative cursor-pointer"
              onClick={() => { onEnterSetup(); }} // 手機版或滑鼠可以直接點擊螢幕進入 BIOS
            >
              <div className="flex items-start gap-4">
                <IconStar size={48} className="text-yellow-400 fill-yellow-400" />
                <div>
                  <h1 className="text-4xl sm:text-6xl font-bold tracking-widest text-gray-200">CUTE MEGATRENDS</h1>
                  <p className="text-sm mt-2 text-gray-400">www.cute-ami.com</p>
                </div>
              </div>
              <div className="absolute bottom-12 text-gray-400 text-sm animate-pulse text-center">
                Press DEL to enter SETUP, ESC to skip memory test
                <div className="text-xs text-gray-600 mt-2">(手機版請直接點擊螢幕任意處進入 BIOS)</div>
              </div>
            </div>
          );
        };

        const BiosSetupScreen = ({ onExit }) => {
          const [exitPrompt, setExitPrompt] = useState(false);
          const [settings, setSettings] = useState({
            fluffyProcessor: 'Auto',
            pinkAesthetics: 'Enabled',
            virtualPetState: 'Active',
            bootDevice: 'CuteOS Drive'
          });
          const [activeIndex, setActiveIndex] = useState(0);
          const keys = Object.keys(settings);
          
          const labels = {
            fluffyProcessor: 'Fluffy Processor Speed',
            pinkAesthetics: 'Pink Aesthetics Driver',
            virtualPetState: 'Virtual Pet Mount State',
            bootDevice: 'First Boot Device'
          };

          const handleToggle = (key) => {
            const options = {
              fluffyProcessor: ['Auto', 'Overfluff (3.0GHz)', 'Underfluff (1.2GHz)'],
              pinkAesthetics: ['Enabled', 'Disabled', 'Maximum Pink'],
              virtualPetState: ['Active', 'Hibernation', 'Always Hungry'],
              bootDevice: ['CuteOS Drive', 'Floppy (1.44MB)', 'Network PXE']
            };
            const curr = settings[key];
            const idx = options[key].indexOf(curr);
            const next = options[key][(idx + 1) % options[key].length];
            setSettings({...settings, [key]: next});
          };

          useEffect(() => {
            const handleKeyDown = (e) => {
              if (exitPrompt) {
                if (e.key.toLowerCase() === 'y' || e.key.toLowerCase() === 'n' || e.key === 'Enter') onExit();
                if (e.key === 'Escape') setExitPrompt(false);
                return;
              }
              if (e.key === 'Escape' || e.key === 'F10') setExitPrompt(true);
              if (e.key === 'ArrowDown') setActiveIndex((i) => (i + 1) % keys.length);
              if (e.key === 'ArrowUp') setActiveIndex((i) => (i - 1 + keys.length) % keys.length);
              if (e.key === 'Enter' || e.key === ' ') handleToggle(keys[activeIndex]);
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [exitPrompt, activeIndex, settings, onExit]);

          return (
            <div className="w-full h-screen bg-[#0000AA] text-gray-200 font-mono select-none flex flex-col sm:text-base text-sm">
              <div className="bg-gray-200 text-[#0000AA] text-center font-bold py-1 px-4 flex justify-between shadow-sm">
                <span>CuteBIOS Setup Utility</span>
                <span>Advanced Cute Settings</span>
              </div>
              
              <div className="flex-1 flex flex-col sm:flex-row p-4 gap-4">
                <div className="flex-[2] border-2 border-double border-gray-400 p-4 space-y-2 relative">
                  {keys.map((k, i) => (
                    <div 
                      key={k} 
                      onClick={() => { setActiveIndex(i); handleToggle(k); }}
                      className={`flex justify-between cursor-pointer px-2 py-1 ${activeIndex === i ? 'bg-white text-[#0000AA]' : ''}`}
                    >
                      <span>{labels[k]}</span>
                      <span>[{settings[k]}]</span>
                    </div>
                  ))}

                  {/* 經典的離開存檔提示 */}
                  {exitPrompt && (
                    <div className="absolute inset-0 bg-black/50 flex items-center justify-center z-10">
                      <div className="bg-red-700 text-white border-2 border-gray-200 p-4 shadow-lg text-center max-w-sm">
                        <div className="mb-4 font-bold">Save configuration changes and exit now?</div>
                        <div className="mb-4 text-gray-300">[Y] Yes &nbsp;&nbsp;&nbsp; [N] No</div>
                        <div className="mt-4 flex justify-center gap-4">
                            <button onClick={onExit} className="bg-gray-300 text-black px-6 py-1 hover:bg-white font-bold transition-colors">Yes</button>
                            <button onClick={() => setExitPrompt(false)} className="bg-gray-300 text-black px-6 py-1 hover:bg-white font-bold transition-colors">No</button>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
                
                {/* 右側說明面板 */}
                <div className="flex-1 border-2 border-double border-gray-400 p-4 text-gray-300">
                  <div className="font-bold mb-2">Item Help</div>
                  <hr className="border-gray-500 mb-2"/>
                  {activeIndex === 0 && "Selects the fluffiness of the main processor.\n\nWarning: Overfluffing may cause excessive cuteness and overheating."}
                  {activeIndex === 1 && "Enable or disable the core pink aesthetics rendering engine."}
                  {activeIndex === 2 && "Configure the initial state of the virtual pet on system boot."}
                  {activeIndex === 3 && "Select the primary device to load CuteOS from."}
                </div>
              </div>

              <div className="border-t-2 border-gray-400 text-gray-400 p-2 flex flex-wrap gap-6 text-xs justify-center sm:justify-start">
                <span>↑↓: Move</span>
                <span>Enter: Change</span>
                <span>ESC: Exit</span>
                <span>F10: Save & Exit</span>
                <span className="ml-auto cursor-pointer border border-gray-500 px-3 py-1 hover:bg-gray-700 transition-colors" onClick={() => setExitPrompt(true)}>Save & Exit (Click)</span>
              </div>
            </div>
          );
        };

        const DosScreen = ({ onComplete }) => {
          const [lines, setLines] = useState([]);
          const bootMessages = [
            "CuteBIOS (C) 2026 Cute Megatrends, Inc.",
            "CPU: Fluffy Processor @ 2.4GHz",
            "Memory Test: 8388608K OK",
            "Initializing USB Controllers .. Done.",
            "Loading Pink Aesthetics Drivers ... OK",
            "Mounting Virtual Pet ... OK",
            "Starting CuteOS Core ...",
            "Welcome to CuteOS!"
          ];

          useEffect(() => {
            let currentLine = 0;
            const interval = setInterval(() => {
              if (currentLine < bootMessages.length) {
                setLines(prev => [...prev, bootMessages[currentLine]]);
                currentLine++;
              } else {
                clearInterval(interval);
                setTimeout(onComplete, 800); 
              }
            }, 300); 
            return () => clearInterval(interval);
          }, [onComplete]);

          return (
            <div className="w-full h-screen bg-black text-gray-300 font-mono p-4 select-none overflow-hidden text-sm sm:text-base">
              <div className="flex justify-between items-start mb-4">
                 <div className="flex items-center gap-2">
                   <IconStar size={24} className="text-yellow-400 fill-yellow-400" />
                   <span className="font-bold">Energy Star</span>
                 </div>
              </div>
              <div className="space-y-1">
                {lines.map((line, i) => (
                  <div key={i}>{line}</div>
                ))}
                <div className="animate-pulse inline-block">_</div>
              </div>
            </div>
          );
        };

        const WelcomeScreen = ({ isDarkMode }) => (
          <div className={`w-full h-screen flex flex-col items-center justify-center select-none transition-colors duration-500 ${isDarkMode ? 'bg-slate-900 text-white' : 'bg-pink-50 text-gray-700'}`}>
             <div className="w-24 h-24 bg-pink-200 dark:bg-slate-700 rounded-full flex items-center justify-center text-5xl shadow-md mb-6 animate-bounce">
                🐰
             </div>
             <h2 className="text-3xl font-bold mb-8">歡迎使用</h2>
             <IconLoader size={32} className="animate-spin text-pink-500 dark:text-pink-400" />
          </div>
        );

        const ShutdownScreen = ({ isDarkMode }) => (
          <div className={`w-full h-screen flex flex-col items-center justify-center select-none transition-colors duration-500 ${isDarkMode ? 'bg-slate-900 text-white' : 'bg-pink-50 text-gray-700'}`}>
             <IconLoader size={32} className="animate-spin text-pink-500 dark:text-pink-400 mb-6" />
             <h2 className="text-2xl font-bold">正在重新啟動...</h2>
          </div>
        );

        const BSODScreen = () => (
          <div className="w-full h-screen bg-[#0000AA] text-white font-mono p-8 sm:p-16 flex flex-col justify-center select-none cursor-none z-[9999] relative">
             <h1 className="text-6xl sm:text-8xl mb-8 font-bold">:(</h1>
             <p className="text-xl sm:text-3xl mb-8 leading-relaxed">
               您的可愛電腦遇到了一個致命的賣萌錯誤，必須重新啟動。<br/>
               我們正在收集錯誤資訊 (0%)
             </p>
             <p className="text-sm sm:text-base text-gray-300 mt-4">
               如果您想了解更多，可以稍後在網路上搜尋此錯誤代碼: CUTE_OVERLOAD_EXCEPTION<br/><br/>
               *** STOP: 0x000000C4 (0x0000000000000091, 0x000000000000000F, 0xFFFFF80002A3B5C8, 0x0000000000000000)<br/>
               *** Cute3D_Render_Engine.sys - Address FFFFF80002A3B5C8 base at FFFFF80002A3B000, DateStamp 60a4f5f5
             </p>
          </div>
        );

        // --- 特製 SVG 桌布元件 (呆萌版 Win11) ---
        const DerpyWin11Wallpaper = ({ isDark }) => {
          const c1 = isDark ? "#0f172a" : "#bae6fd"; // 外圍底色
          const c2 = isDark ? "#1e40af" : "#60a5fa"; // 中間層
          const c3 = isDark ? "#06b6d4" : "#3b82f6"; // 亮部 (深色帶點青色)
          const c4 = isDark ? "#020617" : "#1d4ed8"; // 最深陰影

          return (
            <div className="absolute inset-0 overflow-hidden pointer-events-none flex items-center justify-center z-0 transition-colors duration-700">
              <svg className="w-[150vw] h-[150vh] sm:w-[120vw] sm:h-[120vh] max-w-none opacity-90 mix-blend-normal" viewBox="0 0 1000 800" preserveAspectRatio="xMidYMid slice">
                <defs>
                  <linearGradient id="w11-grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stopColor={c1} />
                    <stop offset="100%" stopColor={c4} />
                  </linearGradient>
                  <linearGradient id="w11-grad2" x1="100%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stopColor={c2} />
                    <stop offset="100%" stopColor={c4} />
                  </linearGradient>
                  <linearGradient id="w11-grad3" x1="50%" y1="0%" x2="50%" y2="100%">
                    <stop offset="0%" stopColor={c3} />
                    <stop offset="100%" stopColor={c2} />
                  </linearGradient>
                </defs>
                
                {/* 致敬 Win11 的布料/花瓣層疊，但故意弄得圓潤肥滿一點 */}
                <path d="M 100,900 C -50,500 350,50 600,250 C 850,450 750,850 900,900 Z" fill="url(#w11-grad1)" />
                <path d="M 0,900 C 250,550 450,150 700,300 C 950,450 850,750 1000,900 Z" fill="url(#w11-grad2)" opacity="0.8" />
                <path d="M 350,900 C 250,450 600,200 800,350 C 1000,500 750,850 650,900 Z" fill="url(#w11-grad3)" opacity="0.9" />
                <path d="M 250,900 C 350,550 700,300 850,450 C 1000,600 850,850 800,900 Z" fill="url(#w11-grad1)" opacity="0.7" />

                {/* 藏在花瓣裡面的靈魂呆萌小臉 (・∀・) */}
                <g transform="translate(640, 400)">
                   <circle cx="-35" cy="0" r="9" fill={c4} opacity="0.7"/>
                   <circle cx="35" cy="0" r="9" fill={c4} opacity="0.7"/>
                   <path d="M -15,15 Q 0,30 15,15" fill="none" stroke={c4} strokeWidth="6" strokeLinecap="round" opacity="0.7"/>
                   {/* 腮紅 */}
                   <ellipse cx="-55" cy="12" rx="14" ry="8" fill="#f472b6" opacity="0.5"/>
                   <ellipse cx="55" cy="12" rx="14" ry="8" fill="#f472b6" opacity="0.5"/>
                </g>
              </svg>
            </div>
          );
        };

        // --- 特製 SVG 桌布元件 (經典草地 XP 版) ---
        const DerpyXPWallpaper = ({ isDark }) => {
          const skyTop = isDark ? "#020617" : "#2563eb"; 
          const skyBottom = isDark ? "#1e1b4b" : "#93c5fd";
          const hillBack = isDark ? "#064e3b" : "#65a30d";
          const hillFront = isDark ? "#022c22" : "#4ade80";
          const cloudColor = isDark ? "#334155" : "#ffffff";
          const faceColor = isDark ? "#0f172a" : "#334155";

          return (
            <div className="absolute inset-0 overflow-hidden pointer-events-none flex items-center justify-center z-0 transition-colors duration-700">
              <svg className="w-full h-full object-cover min-w-[1000px] min-h-[800px] mix-blend-normal" viewBox="0 0 1000 800" preserveAspectRatio="xMidYMid slice">
                <defs>
                  <linearGradient id="xp-sky" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stopColor={skyTop} />
                    <stop offset="100%" stopColor={skyBottom} />
                  </linearGradient>
                </defs>
                {/* 天空 */}
                <rect width="1000" height="800" fill="url(#xp-sky)" className="transition-all duration-700" />
                
                {/* 呆萌白雲 (・∀・) */}
                <g transform="translate(250, 250)" className="transition-all duration-700">
                   <circle cx="-60" cy="10" r="40" fill={cloudColor} className="transition-colors duration-700" />
                   <circle cx="0" cy="-20" r="60" fill={cloudColor} className="transition-colors duration-700" />
                   <circle cx="60" cy="10" r="50" fill={cloudColor} className="transition-colors duration-700" />
                   <circle cx="-100" cy="30" r="30" fill={cloudColor} className="transition-colors duration-700" />
                   <circle cx="100" cy="30" r="35" fill={cloudColor} className="transition-colors duration-700" />
                   <rect x="-100" y="10" width="200" height="50" fill={cloudColor} className="transition-colors duration-700" />
                   {/* 臉 */}
                   <circle cx="-20" cy="10" r="5" fill={faceColor} className="transition-colors duration-700" />
                   <circle cx="20" cy="10" r="5" fill={faceColor} className="transition-colors duration-700" />
                   <path d="M -6,25 Q 0,35 6,25" fill="none" stroke={faceColor} strokeWidth="4" strokeLinecap="round" className="transition-colors duration-700" />
                   <ellipse cx="-35" cy="15" rx="10" ry="6" fill="#f472b6" opacity={isDark ? "0.3" : "0.6"} className="transition-opacity duration-700"/>
                   <ellipse cx="35" cy="15" rx="10" ry="6" fill="#f472b6" opacity={isDark ? "0.3" : "0.6"} className="transition-opacity duration-700"/>
                </g>

                {/* 第二朵普通雲 */}
                <g transform="translate(750, 180) scale(0.7)" opacity="0.8" className="transition-all duration-700">
                   <circle cx="-60" cy="10" r="40" fill={cloudColor} className="transition-colors duration-700"/>
                   <circle cx="0" cy="-20" r="60" fill={cloudColor} className="transition-colors duration-700"/>
                   <circle cx="60" cy="10" r="50" fill={cloudColor} className="transition-colors duration-700"/>
                   <rect x="-60" y="10" width="120" height="50" fill={cloudColor} className="transition-colors duration-700"/>
                </g>

                {/* 遠處的山丘 */}

       // 2. 計算機
        const AppCalculator = () => {
          const [display, setDisplay] = useState('0');
          const [equation, setEquation] = useState('');

          const handleClick = (val) => {
            if (val === 'C') { setDisplay('0'); setEquation(''); return; }
            if (val === '=') {
              try {
                const result = new Function('return ' + equation + display)();
                setDisplay(String(result));
                setEquation('');
              } catch (e) {
                setDisplay('Error');
              }
              return;
            }
            if (['+', '-', '*', '/'].includes(val)) {
              setEquation(equation + display + val);
              setDisplay('0');
              return;
            }
            setDisplay(display === '0' ? val : display + val);
          };

          const buttons = ['C', '/', '*', '-', '7', '8', '9', '+', '4', '5', '6', '=', '1', '2', '3', '0', '.'];

          return (
            <div className="w-full h-full flex flex-col bg-pink-50 dark:bg-slate-800 p-4 font-mono transition-colors">

                <div className="text-gray-400 dark:text-gray-500 text-sm h-5">{equation}</div>
                <div className="text-3xl text-gray-700 dark:text-gray-200 font-bold overflow-hidden">{display}</div>

                    key={i}

                      ${btn === '=' ? 'col-span-1 row-span-2 bg-pink-300 dark:bg-pink-600 text-white hover:bg-pink-400 dark:hover:bg-pink-500' : 
                        btn === '0' ? 'col-span-2 bg-white dark:bg-slate-700 text-gray-600 dark:text-gray-200 hover:bg-pink-100 dark:hover:bg-slate-600' : 
                        ['+','-','*','/','C'].includes(btn) ? 'bg-pink-200 dark:bg-slate-600 text-pink-800 dark:text-pink-300 hover:bg-pink-300 dark:hover:bg-slate-500' : 
                        'bg-white dark:bg-slate-700 text-gray-600 dark:text-gray-200 hover:bg-pink-100 dark:hover:bg-slate-600'}
                    `}

                  >
                    {btn}

        // 3. 小畫家
        const AppPaint = () => {
          const canvasRef = useRef(null);
          const [isDrawing, setIsDrawing] = useState(false);
          const [color, setColor] = useState('#ff9a9e');

          useEffect(() => {
            const canvas = canvasRef.current;
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            const ctx = canvas.getContext('2d');
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = 5;
          }, []);

          useEffect(() => {
            if (canvasRef.current) {
              canvasRef.current.getContext('2d').strokeStyle = color;
            }
          }, [color]);

          const startDraw = (e) => {
            setIsDrawing(true);
            draw(e);
          };

          const endDraw = () => {
            setIsDrawing(false);
            if(canvasRef.current) canvasRef.current.getContext('2d').beginPath();
          };

          const draw = (e) => {
            if (!isDrawing) return;
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            
            ctx.lineTo(x - rect.left, y - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x - rect.left, y - rect.top);
          };

          const colors = ['#ff9a9e', '#fecfef', '#a1c4fd', '#fdcbf1', '#e0c3fc', '#4facfe', '#43e97b', '#333333'];

          return (
            <div className="w-full h-full flex flex-col bg-white dark:bg-slate-800 transition-colors">
              <div className="flex gap-2 p-2 bg-purple-50 dark:bg-slate-900 border-b border-purple-100 dark:border-slate-700 justify-center flex-wrap transition-colors">
                {colors.map(c => (
                  <button 
                    key={c} 
                    onClick={() => setColor(c)}
                    className={`w-6 h-6 sm:w-8 sm:h-8 rounded-full shadow-sm border-2 transition-transform hover:scale-110 ${color === c ? 'border-gray-500 dark:border-gray-300 scale-110' : 'border-transparent'}`}
                    style={{ backgroundColor: c }}
                  />
                ))}
                <button 
                  onClick={() => {
                    const canvas = canvasRef.current;
                    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                  }}
                  className="ml-auto px-3 py-1 bg-white dark:bg-slate-700 rounded-full text-xs text-purple-600 dark:text-purple-300 shadow-sm border border-purple-200 dark:border-slate-600 hover:bg-purple-100 dark:hover:bg-slate-600 transition-colors"
                >
                  清除
                </button>
              </div>
              <canvas 
                ref={canvasRef}
                onMouseDown={startDraw} onMouseMove={draw} onMouseUp={endDraw} onMouseLeave={endDraw}
                onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={endDraw}
                className="flex-1 w-full cursor-crosshair touch-none bg-white" 
              />
            </div>
          );
        };

        // 4. 小寵物
        const AppPet = () => {
          const [hunger, setHunger] = useState(80);
          const [happiness, setHappiness] = useState(80);
          const [status, setStatus] = useState('我在發呆...');

          const feed = () => {
            setHunger(prev => Math.min(100, prev + 20));
            setStatus('嚼嚼嚼... 好吃！🍓');
          };

          const play = () => {
            setHappiness(prev => Math.min(100, prev + 20));
            setHunger(prev => Math.max(0, prev - 10));
            setStatus('哇嗚～好玩！✨');
          };

          useEffect(() => {
            const timer = setInterval(() => {
              setHunger(prev => Math.max(0, prev - 2));
              setHappiness(prev => Math.max(0, prev - 2));
            }, 5000);
            return () => clearInterval(timer);
          }, []);

          let emotion = '🐹';
          if (happiness < 30 || hunger < 30) emotion = '🥺';
          if (happiness > 80 && hunger > 80) emotion = '🐹💕';

          return (
            <div className="w-full h-full flex flex-col items-center justify-center bg-gradient-to-br from-orange-50 to-yellow-50 dark:from-slate-800 dark:to-indigo-950 p-4 transition-colors">
              <div className="text-7xl mb-4 animate-bounce">{emotion}</div>
              <div className="bg-white dark:bg-slate-700 px-4 py-2 rounded-2xl shadow-sm text-gray-600 dark:text-gray-200 text-sm mb-6 font-medium transition-colors">
                {status}
              </div>
              
              <div className="w-full max-w-xs space-y-3 mb-6">
                <div>
                  <div className="flex justify-between text-xs text-orange-800 dark:text-orange-300 mb-1 transition-colors">

                    <div className="h-full bg-orange-400 dark:bg-orange-500 transition-all" style={{ width: `${hunger}%` }} />
                  </div>
                </div>
                <div>
                  <div className="flex justify-between text-xs text-pink-800 dark:text-pink-300 mb-1 transition-colors">
                    <span>心情</span><span>{happiness}%</span>
                  </div>
                  <div className="h-2 bg-pink-100 dark:bg-slate-600 rounded-full overflow-hidden transition-colors">
                    <div className="h-full bg-pink-400 dark:bg-pink-500 transition-all" style={{ width: `${happiness}%` }} />
                  </div>
                </div>
              </div>

              <div className="flex gap-4">
                <button onClick={feed} className="px-6 py-2 bg-orange-300 dark:bg-orange-600 hover:bg-orange-400 dark:hover:bg-orange-500 text-white rounded-full font-bold shadow-md transition-transform active:scale-95 flex items-center gap-2">
                  餵食 🍓
                </button>
                <button onClick={play} className="px-6 py-2 bg-pink-300 dark:bg-pink-600 hover:bg-pink-400 dark:hover:bg-pink-500 text-white rounded-full font-bold shadow-md transition-transform active:scale-95 flex items-center gap-2">
                  玩耍 🎾
                </button>
              </div>
            </div>
          );
        };

        // 5. CuteUI (ComfyUI 可愛版)
        const AppComfyUI = () => {
          const containerRef = useRef(null);
          const [nodes, setNodes] = useState([
            { id: 'n1', type: 'model', x: 20, y: 50, title: '🌸 Checkpoint' },
            { id: 'n2', type: 'prompt', x: 20, y: 150, title: '✍️ Prompt', text: 'cute anime girl, masterpiece' },
            { id: 'n3', type: 'sampler', x: 260, y: 80, title: '⚙️ K-Sampler', progress: 0 },
            { id: 'n4', type: 'output', x: 460, y: 100, title: '🖼️ Save Image', image: null }
          ]);
          const [links, setLinks] = useState([
            { id: 'l1', source: 'n1', target: 'n3' },
            { id: 'l2', source: 'n2', target: 'n3' },
            { id: 'l3', source: 'n3', target: 'n4' }
          ]);
          const [activeDrag, setActiveDrag] = useState(null);
          const [drawingLink, setDrawingLink] = useState(null);
          const [isGenerating, setIsGenerating] = useState(false);

          const handlePointerDownNode = (e, n) => {
            if (e.target.closest('button') || e.target.closest('textarea') || e.target.closest('.port')) return;
            const rect = containerRef.current.getBoundingClientRect();
            setActiveDrag({ type: 'node', id: n.id, offsetX: (e.clientX - rect.left) - n.x, offsetY: (e.clientY - rect.top) - n.y });
            e.currentTarget.setPointerCapture(e.pointerId);
          };

          const handlePointerMove = (e) => {
            if (!activeDrag) return;
            const rect = containerRef.current.getBoundingClientRect();
            const rx = e.clientX - rect.left;
            const ry = e.clientY - rect.top;

            if (activeDrag.type === 'node') {
              setNodes(ns => ns.map(n => n.id === activeDrag.id ? { ...n, x: rx - activeDrag.offsetX, y: ry - activeDrag.offsetY } : n));
            } else if (activeDrag.type === 'link') {
              setDrawingLink(prev => ({ ...prev, toX: rx, toY: ry }));
            }
          };

          const handlePointerUp = (e) => {
            if (activeDrag?.type === 'node') {
              e.currentTarget.releasePointerCapture(e.pointerId);
            }
            setActiveDrag(null);
            setDrawingLink(null);
          };

          const startDragLink = (e, sourceId) => {
            e.stopPropagation();
            const rect = containerRef.current.getBoundingClientRect();
            setActiveDrag({ type: 'link', sourceId });
            setDrawingLink({
              sourceId,
              fromX: e.clientX - rect.left,
              fromY: e.clientY - rect.top,
              toX: e.clientX - rect.left,
              toY: e.clientY - rect.top
            });
          };

          const finishDragLink = (e, targetId) => {
            e.stopPropagation();
            if (activeDrag?.type === 'link' && activeDrag.sourceId !== targetId) {
              setLinks(ls => [...ls, { id: 'l_' + Date.now(), source: activeDrag.sourceId, target: targetId }]);
            }
            setActiveDrag(null);
            setDrawingLink(null);
          };

          const deleteLink = (id) => setLinks(ls => ls.filter(l => l.id !== id));
          
          const cloneNode = (e, id) => {
            e.stopPropagation();
            const n = nodes.find(x => x.id === id);
            if (n) setNodes([...nodes, { ...n, id: 'n_' + Date.now(), x: n.x + 20, y: n.y + 20 }]);
          };

          const deleteNode = (e, id) => {
            e.stopPropagation();
            setNodes(ns => ns.filter(n => n.id !== id));
            setLinks(ls => ls.filter(l => l.source !== id && l.target !== id));
          };

          const handleGenerate = () => {
            if (isGenerating) return;
            setIsGenerating(true);
            let p = 0;
            const interval = setInterval(() => {
              p += 10;
              setNodes(ns => ns.map(n => n.type === 'sampler' ? { ...n, progress: Math.min(p, 100) } : n));
              if (p >= 100) {
                clearInterval(interval);
                setIsGenerating(false);
                setNodes(ns => ns.map(n => {
                  if (n.type === 'sampler') return { ...n, progress: 0 };
                  if (n.type === 'output') {
                     const isAnimal = Math.random() > 0.5;
                     const seed = Math.random().toString(36).substring(7);
                     // 模擬 AI 產圖：隨機產生妹子頭像或是好笑的表情小動物
                     const url = isAnimal 
                        ? `https://api.dicebear.com/7.x/fun-emoji/svg?seed=${seed}`
                        : `https://api.dicebear.com/7.x/lorelei/svg?seed=${seed}`;
                     return { ...n, image: url };
                  }
                  return n;
                }));
              }
            }, 250);
          };

          return (
            <div ref={containerRef} className="w-full h-full bg-[#1e1e1e] relative overflow-hidden font-sans select-none"
                 onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerLeave={handlePointerUp}
                 style={{ backgroundImage: 'radial-gradient(#333 1px, transparent 1px)', backgroundSize: '20px 20px' }}>
              
              <svg className="absolute inset-0 w-full h-full pointer-events-none z-0">
                {links.map(l => {
                  const src = nodes.find(n => n.id === l.source);
                  const tgt = nodes.find(n => n.id === l.target);
                  if (!src || !tgt) return null;
                  const x1 = src.x + 160; const y1 = src.y + 40;
                  const x2 = tgt.x; const y2 = tgt.y + 40;
                  return <path key={l.id} d={`M ${x1} ${y1} C ${x1+50} ${y1}, ${x2-50} ${y2}, ${x2} ${y2}`} 
                               fill="none" stroke="#ec4899" strokeWidth="4" 
                               className="pointer-events-auto cursor-pointer hover:stroke-red-500 transition-colors drop-shadow-md"
                               onDoubleClick={() => deleteLink(l.id)} />
                })}
                {drawingLink && (
                  <path d={`M ${drawingLink.fromX} ${drawingLink.fromY} C ${drawingLink.fromX+50} ${drawingLink.fromY}, ${drawingLink.toX-50} ${drawingLink.toY}, ${drawingLink.toX} ${drawingLink.toY}`} 
                        fill="none" stroke="#ec4899" strokeWidth="4" strokeDasharray="5,5" className="opacity-50" />
                )}
              </svg>

              {nodes.map(n => (
                <div key={n.id} className="absolute w-[160px] bg-gray-800 rounded-xl shadow-2xl border border-gray-600 text-gray-200 flex flex-col z-10"
                     style={{ left: n.x, top: n.y }}>
                  <div className="bg-gray-700 p-2 rounded-t-xl flex justify-between items-center cursor-move" onPointerDown={(e) => handlePointerDownNode(e, n)}>
                    <span className="font-bold text-xs truncate flex-1 drop-shadow-md">{n.title}</span>
                    <div className="flex gap-1 ml-2">
                      <button onClick={(e) => cloneNode(e, n.id)} className="text-gray-400 hover:text-white" title="複製節點">📄</button>
                      <button onClick={(e) => deleteNode(e, n.id)} className="text-gray-400 hover:text-red-400" title="刪除節點">✕</button>
                    </div>
                  </div>
                  <div className="p-3 flex-1 flex flex-col gap-2 relative">
                    {n.type === 'prompt' && <textarea className="w-full bg-gray-900 text-gray-300 p-2 text-[10px] rounded-lg resize-none border border-gray-700 focus:border-pink-500 focus:outline-none" rows="3" defaultValue={n.text} />}
                    {n.type === 'sampler' && (
                      <div>
                        <div className="text-[10px] text-gray-400 mb-1">Steps: 20</div>
                        <div className="h-2 bg-gray-900 rounded-full overflow-hidden border border-gray-700">
                          <div className="h-full bg-pink-500 transition-all duration-300" style={{width: `${n.progress||0}%`}}/>
                        </div>
                      </div>
                    )}
                    {n.type === 'output' && (
                      <div className="w-full h-24 bg-gray-900 rounded-lg flex items-center justify-center text-gray-600 border border-gray-700 overflow-hidden relative">
                        {n.image ? <img src={n.image} className="w-full h-full object-cover bg-white" draggable="false" /> : <span className="text-[10px]">No Image</span>}
                      </div>
                    )}
                    {n.type === 'model' && <div className="text-[10px] text-pink-300 bg-pink-900/30 p-1 rounded text-center border border-pink-800/50">v1-5-pruned.ckpt</div>}
                  </div>
                  {n.type !== 'output' && <div className="port absolute -right-2 top-10 w-4 h-4 bg-pink-500 rounded-full cursor-crosshair border-2 border-gray-800 hover:scale-125 transition-transform z-20 shadow-md" onPointerDown={(e) => startDragLink(e, n.id)} />}
                  {n.type !== 'model' && <div className="port absolute -left-2 top-10 w-4 h-4 bg-blue-500 rounded-full border-2 border-gray-800 hover:scale-125 transition-transform z-20 shadow-md" onPointerUp={(e) => finishDragLink(e, n.id)} />}

        // 8. Cute3D (專業建模軟體 - 真實 3D 升級版)
        const AppCute3D = () => {
          const containerRef = useRef(null);
          const [objects, setObjects] = React.useState([]);
          const [selectedId, setSelectedId] = React.useState(null);
          const [rendering, setRendering] = React.useState(false);
          const [buckets, setBuckets] = React.useState([]);
          
          // 用來儲存 Three.js 的實體
          const sceneRef = useRef(null);
          const cameraRef = useRef(null);
          const rendererRef = useRef(null);
          const meshesRef = useRef({});

          // 初始化 Three.js 引擎
          useEffect(() => {
            if (!window.THREE) return; // 確保引擎已載入
            
            const width = containerRef.current.clientWidth;
            const height = containerRef.current.clientHeight;

            // 1. 建立場景
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1e1e1e);
            sceneRef.current = scene;

            // 2. 建立攝影機
            const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
            camera.position.z = 5;
            camera.position.y = 2;
            camera.lookAt(0, 0, 0);
            cameraRef.current = camera;

            // 3. 建立渲染器
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(width, height);
            containerRef.current.appendChild(renderer.domElement);
            rendererRef.current = renderer;

            // 4. 打光 (不然模型會黑黑的)
            const ambientLight = new THREE.AmbientLight(0x404040, 1.5); 
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(2, 5, 3).normalize();
            scene.add(directionalLight);

            // 5. 專業的網格地板
            const gridHelper = new THREE.GridHelper(10, 10, 0x888888, 0x444444);
            scene.add(gridHelper);

            // 6. 動畫迴圈
            let animationId;
            const animate = () => {
              animationId = requestAnimationFrame(animate);
              // 讓選中的物件微微發光或標示 (這裡保持靜態，由 React 屬性控制)
              renderer.render(scene, camera);
            };
            animate();

            // 7. 響應式視窗縮放
            const handleResize = () => {
               if (!containerRef.current || !cameraRef.current || !rendererRef.current) return;
               const w = containerRef.current.clientWidth;
               const h = containerRef.current.clientHeight;
               cameraRef.current.aspect = w / h;
               cameraRef.current.updateProjectionMatrix();
               rendererRef.current.setSize(w, h);
            };
            window.addEventListener('resize', handleResize);

            // 清理
            return () => {
              cancelAnimationFrame(animationId);
              window.removeEventListener('resize', handleResize);
              if (containerRef.current && renderer.domElement) {
                 containerRef.current.removeChild(renderer.domElement);
              }
            };
          }, []);

          // 新增 3D 物件
          const addObj = (type) => {
            if (!sceneRef.current) return;
            
            let geometry;
            // 給它一個隨機的可愛柔和顏色
            const randomColor = new THREE.Color().setHSL(Math.random(), 0.7, 0.6);
            const material = new THREE.MeshStandardMaterial({ 
              color: randomColor,
              roughness: 0.3,
              metalness: 0.1
            });

            if (type === 'Cube') geometry = new THREE.BoxGeometry();
            else if (type === 'Sphere') geometry = new THREE.SphereGeometry(0.7, 32, 16);
            else if (type === 'Cone') geometry = new THREE.ConeGeometry(0.7, 1.5, 32);

            const mesh = new THREE.Mesh(geometry, material);
            // 稍微錯開位置，不要全部疊在一起
            mesh.position.set((Math.random() - 0.5) * 4, 0.5, (Math.random() - 0.5) * 4);
            
            sceneRef.current.add(mesh);
            
            const id = Date.now().toString();
            meshesRef.current[id] = mesh;
            
            const newObj = {
              id,
              name: `${type} ${objects.length + 1}`,
              type,
              px: mesh.position.x.toFixed(2), py: mesh.position.y.toFixed(2), pz: mesh.position.z.toFixed(2),
              rx: 0, ry: 0, rz: 0,
              sx: 1, sy: 1, sz: 1
            };
            
            setObjects(prev => [...prev, newObj]);
            setSelectedId(id);
          };

          // 處理屬性面板的數值變更
          const updateTransform = (axis, value) => {
             if (!selectedId) return;
             const mesh = meshesRef.current[selectedId];
             if (!mesh) return;

             const numVal = parseFloat(value) || 0;
             
             setObjects(objs => objs.map(o => {
                if (o.id === selectedId) {
                   const newObj = { ...o, [axis]: numVal };
                   // 即時套用到 Three.js 實體上
                   mesh.position.set(newObj.px, newObj.py, newObj.pz);
                   // 角度轉弧度
                   mesh.rotation.set(newObj.rx * Math.PI/180, newObj.ry * Math.PI/180, newObj.rz * Math.PI/180);
                   mesh.scale.set(newObj.sx, newObj.sy, newObj.sz);
                   return newObj;
                }
                return o;
             }));
          };

          // 死亡渲染引擎
          const handleRender = () => {
            setRendering(true);
            setBuckets([]);
            let b = [];
            const timer = setInterval(() => {
              b.push(b.length);
              setBuckets([...b]);
              // 跑到第9格必定當機送藍白畫面
              if (b.length > 8) {
                clearInterval(timer);
                window.dispatchEvent(new CustomEvent('os-bsod'));
              }
            }, 300);
          };

          const selectedObj = objects.find(o => o.id === selectedId);

          return (
            <div className="w-full h-full flex flex-col bg-gray-100 dark:bg-slate-800 transition-colors select-none font-sans text-xs">
              {/* 頂部工具列 */}
              <div className="flex gap-2 p-2 bg-gray-200 dark:bg-slate-700 border-b border-gray-300 dark:border-slate-600 z-20 items-center overflow-x-auto">

        // 10. CuteCut (專業剪輯軟體)
        const AppCuteCut = () => {
          const [playing, setPlaying] = React.useState(false);
          const [currentTime, setCurrentTime] = React.useState(0); // 0 to 100 (%)
          const timelineRef = useRef(null);
          
          // 初始化兩段短片在時間軸上的位置 (start % 和 width %)
          const [clips, setClips] = React.useState([
            { id: 1, content: '🐰', track: 1, start: 10, width: 30, color: 'bg-pink-400' },
            { id: 2, content: '🐱', track: 2, start: 45, width: 30, color: 'bg-blue-400' }
          ]);

          const [draggingClip, setDraggingClip] = React.useState(null);

          // 播放邏輯
          useEffect(() => {
            let req;
            if (playing) {
              const tick = () => {
                setCurrentTime(prev => {
                  if (prev >= 100) {
                    setPlaying(false);
                    return 0; // 播完自動歸零暫停
                  }
                  return prev + 0.3; // 播放速度
                });
                req = requestAnimationFrame(tick);
              };
              req = requestAnimationFrame(tick);
            }
            return () => cancelAnimationFrame(req);
          }, [playing]);

          // 尋找當前時間點正在播放的片段 (Track 1 優先於 Track 2)
          const activeClip = clips.find(c => currentTime >= c.start && currentTime <= (c.start + c.width));

          // 拖曳片段邏輯
          const handleClipPointerDown = (e, id) => {
            e.stopPropagation();
            if (playing) setPlaying(false);
            const clip = clips.find(c => c.id === id);
            const rect = timelineRef.current.getBoundingClientRect();
            setDraggingClip({
              id,
              startX: e.clientX,
              initialStart: clip.start,
              timelineWidth: rect.width
            });
            e.currentTarget.setPointerCapture(e.pointerId);
          };

          const handleClipPointerMove = (e) => {
            if (!draggingClip) return;
            const deltaX = e.clientX - draggingClip.startX;
            const deltaPercent = (deltaX / draggingClip.timelineWidth) * 100;
            let newStart = draggingClip.initialStart + deltaPercent;
            
            // 邊界限制
            const clip = clips.find(c => c.id === draggingClip.id);
            if (newStart < 0) newStart = 0;
            if (newStart + clip.width > 100) newStart = 100 - clip.width;

            setClips(prev => prev.map(c => c.id === draggingClip.id ? { ...c, start: newStart } : c));
          };

          const handleClipPointerUp = (e) => {
            if (draggingClip) {
              e.currentTarget.releasePointerCapture(e.pointerId);
              setDraggingClip(null);
            }
          };

          // 點擊時間軸切換時間
          const handleTimelineClick = (e) => {
            if (draggingClip) return;
            const rect = timelineRef.current.getBoundingClientRect();
            const percent = ((e.clientX - rect.left) / rect.width) * 100;
            setCurrentTime(Math.max(0, Math.min(100, percent)));
          };

          // SMPTE 彩色條紋 (無訊號畫面)
          const SMPTEBars = () => (
            <div className="w-full h-full flex opacity-80">
              <div className="flex-1 bg-[#BFBFBF]"></div>
              <div className="flex-1 bg-[#C0C000]"></div>
              <div className="flex-1 bg-[#00C0C0]"></div>
              <div className="flex-1 bg-[#00C000]"></div>
              <div className="flex-1 bg-[#C000C0]"></div>
              <div className="flex-1 bg-[#C00000]"></div>
              <div className="flex-1 bg-[#0000C0]"></div>
            </div>
          );

          return (
            <div className="w-full h-full flex flex-col bg-[#1e1e1e] text-gray-300 font-sans select-none">
              
              {/* 頂部工具列 */}
              <div className="h-8 bg-[#2d2d2d] border-b border-[#111] flex items-center px-3 gap-3 text-xs shadow-md z-10">
                <span className="font-bold text-white">✂️ CuteCut Pro</span>
                <span className="text-gray-500">File</span>
                <span className="text-gray-500">Edit</span>
                <span className="text-gray-500">Sequence</span>
              </div>

              {/* 預覽監視器區塊 */}
              <div className="flex-1 flex justify-center items-center bg-[#111] p-4 relative overflow-hidden">
                <div className="w-full max-w-md aspect-video bg-black rounded-lg shadow-2xl overflow-hidden relative border border-[#333] flex items-center justify-center">
                  {activeClip ? (
                    <div className={`text-8xl transition-transform ${playing ? 'animate-bounce' : ''}`}>
                      {activeClip.content}
                    </div>
                  ) : (
                    <>
                      <SMPTEBars />
                      <div className="absolute inset-0 flex items-center justify-center text-white/50 font-mono text-xl font-bold tracking-widest drop-shadow-md">
                        NO SIGNAL
                      </div>
                    </>
                  )}
                  {/* 錄影紅點與時間碼 */}
                  <div className="absolute top-2 right-3 font-mono text-white/70 text-xs flex items-center gap-2 drop-shadow">
                    <span className="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                    {`00:00:0${Math.floor((currentTime/100)*10)}:${Math.floor((currentTime%10)*3)}`}
                  </div>
                </div>
              </div>

              {/* 播放控制區 */}
              <div className="h-12 bg-[#252525] border-y border-[#111] flex items-center justify-center gap-6 z-10">
                <button onClick={() => setCurrentTime(0)} className="hover:text-white transition-colors" title="回到起點">⏮</button>
                <button 
                  onClick={() => setPlaying(!playing)} 
                  className="w-8 h-8 flex items-center justify-center bg-gray-700 hover:bg-pink-600 text-white rounded-full transition-colors shadow-sm"
                >
                  {playing ? '⏸' : '▶'}
                </button>
                <button onClick={() => setCurrentTime(100)} className="hover:text-white transition-colors" title="跳到結尾">⏭</button>
              </div>

              {/* 時間軸區域 */}
              <div className="h-48 bg-[#1a1a1a] flex flex-col relative" ref={timelineRef}>
                {/* 尺標 */}
                <div className="h-6 bg-[#222] border-b border-[#333] cursor-pointer relative flex items-end overflow-hidden text-[10px] text-gray-500" onClick={handleTimelineClick}>
                   {Array.from({length: 11}).map((_, i) => (
                     <div key={i} className="absolute border-l border-gray-600 pl-1 h-3/4" style={{ left: `${i*10}%` }}>{i}s</div>
                   ))}
                </div>

                {/* 播放指針 (Playhead) */}
                <div className="absolute top-0 bottom-0 w-px bg-red-500 z-20 pointer-events-none" style={{ left: `${currentTime}%` }}>
                  <div className="absolute -top-0 -translate-x-1/2 w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-t-[8px] border-t-red-500"></div>
                </div>

                {/* 影片軌道 */}
                <div className="flex-1 flex flex-col overflow-y-auto py-2 gap-1 relative" onClick={handleTimelineClick}>
                  
                  {/* Track V1 */}
                  <div className="h-10 bg-[#222]/50 flex items-center relative group">
                    <div className="absolute left-2 text-[10px] font-bold text-gray-500 z-10">V1</div>
                    {clips.filter(c => c.track === 1).map(clip => (
                      <div 
                        key={clip.id}
                        className={`absolute h-8 rounded-md shadow-md cursor-ew-resize flex items-center justify-center border-2 border-white/20 hover:brightness-110 active:scale-[0.98] transition-all duration-75 ${clip.color} text-xl`}
                        style={{ left: `${clip.start}%`, width: `${clip.width}%` }}
                        onPointerDown={(e) => handleClipPointerDown(e, clip.id)}
                        onPointerMove={handleClipPointerMove}
                        onPointerUp={handleClipPointerUp}
                      >
                        {clip.content}
                      </div>
                    ))}
                  </div>

                  {/* Track V2 */}
                  <div className="h-10 bg-[#222]/50 flex items-center relative group">
                    <div className="absolute left-2 text-[10px] font-bold text-gray-500 z-10">V2</div>
                    {clips.filter(c => c.track === 2).map(clip => (
                      <div 
                        key={clip.id}
                        className={`absolute h-8 rounded-md shadow-md cursor-ew-resize flex items-center justify-center border-2 border-white/20 hover:brightness-110 active:scale-[0.98] transition-all duration-75 ${clip.color} text-xl`}
                        style={{ left: `${clip.start}%`, width: `${clip.width}%` }}
                        onPointerDown={(e) => handleClipPointerDown(e, clip.id)}
                        onPointerMove={handleClipPointerMove}
                        onPointerUp={handleClipPointerUp}
                      >
                        {clip.content}
                      </div>
                    ))}
                  </div>

                  let newSeeds = t.seeds + (Math.random() < 0.4 ? Math.floor(Math.random() * 3) + 1 : 0);
                  if (newSeeds > 45) newSeeds = 45; // 限制最大種子數

                  // 基礎速度 + 種子加成
                  let newSpeed = t.speed + (newSeeds * Math.random() * 0.8);
                  if (newSpeed > 25) newSpeed = 25 - Math.random() * 2; // 限制最高速度大約 25 MB/s

                  // 計算進度增加 (為了展示效果，速度稍微加快)
                  let addedProgress = (newSpeed / t.sizeMB) * 100 * 2; 
                  let newProgress = t.progress + addedProgress;

                      seeds: newSeeds,

        // 14. CuteChat (奪命連環叩通訊軟體)

        // 15. CuteMiner (可愛挖礦機)
        const AppCuteMiner = () => {

          const [stats, setStats] = React.useState({ hashrate: 0, coins: 0.000000, temp: 42 });

          useEffect(() => {

          useEffect(() => {
            let interval;
            if (isMining) {
              interval = setInterval(() => {
                setStats(prev => {
                  const newHashrate = Math.floor(Math.random() * 50) + 80; // 80 - 130 MH/s
                  const coinFound = Math.random() > 0.8; // 20% 機率挖到
                  const newTemp = Math.min(95, prev.temp + (Math.random() > 0.4 ? 1 : -1)); // 溫度緩慢上升
                  const addedCoin = coinFound ? (Math.random() * 0.005) : 0;
                  
                  setLogs(prevLogs => {
                    const newLogs = [...prevLogs];
                    if (newLogs.length > 50) newLogs.shift(); // 最多保留 50 行避免卡頓
                    const time = new Date().toLocaleTimeString();
                    if (coinFound) {
                       newLogs.push(`[${time}] ⚠️ 發現區塊！獲得 ${addedCoin.toFixed(4)} 蘿蔔幣 (CTC) 🥕`);
                    } else {
                       newLogs.push(`[${time}] 運算中... 雜湊率: ${newHashrate} MH/s`);
                    }
                    return newLogs;
                  });

                  return { hashrate: newHashrate, coins: prev.coins + addedCoin, temp: newTemp };
                });
              }, 800);
            } else {
              // 停止挖礦時的降溫邏輯
              interval = setInterval(() => {
                setStats(prev => {
                   if (prev.temp <= 42) return prev;
                   return { ...prev, hashrate: 0, temp: Math.max(42, prev.temp - 2) };
                });
              }, 1000);
            }
            return () => clearInterval(interval);

        // 16. CuteBrush (專業 3D 雕刻軟體 - 大便產生器)
        const AppCuteBrush = () => {
          const canvasRef = useRef(null);
          const [progress, setProgress] = React.useState(0); // 雕刻進度 0 到 100
          const [isDragging, setIsDragging] = React.useState(false);
          const [mousePos, setMousePos] = React.useState({ x: -100, y: -100 });

          // 處理 Canvas 響應式大小與重繪
          useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;

            const observer = new ResizeObserver((entries) => {
              for (let entry of entries) {
                canvas.width = entry.contentRect.width;
                canvas.height = entry.contentRect.height;
                setMousePos(p => ({ ...p })); // 強制重繪
              }
            });
            observer.observe(canvas);
            return () => observer.disconnect();
          }, []);

          // 核心 ZBrush Red Wax 渲染引擎
          useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;

            // ZBrush 經典深灰漸層背景
            const bgGrad = ctx.createLinearGradient(0, 0, 0, h);
            bgGrad.addColorStop(0, '#3a3a3a');
            bgGrad.addColorStop(1, '#1e1e1e');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, w, h);

            const centerX = w / 2;
            const centerY = h / 2 + 30;

            // 繪製 ZBrush 經典深紅蠟 (MatCap Red Wax) 材質球的函數
            const drawWaxSphere = (cx, cy, r) => {
              if (r <= 0) return;
              // 高光偏移到左上方
              const grad = ctx.createRadialGradient(cx - r * 0.35, cy - r * 0.35, r * 0.05, cx, cy, r);
              grad.addColorStop(0, '#fca5a5');    // 銳利高光
              grad.addColorStop(0.1, '#ef4444');  // 亮紅
              grad.addColorStop(0.5, '#991b1b');  // 蠟質主色
              grad.addColorStop(0.85, '#450a0a'); // 深色陰影
              grad.addColorStop(1, '#2a0606');    // 邊緣反光收斂

              ctx.beginPath();
              ctx.arc(cx, cy, r, 0, Math.PI * 2);
              ctx.fillStyle = grad;
              ctx.fill();
            };

            // 1. 繪製基底球體 (隨著雕刻進度縮小)
            const baseR = 120 * Math.max(0, (1 - progress / 60)); // 進度到 60% 時底球完全消失
            if (baseR > 0) {
              drawWaxSphere(centerX, centerY, baseR);
            }

            // 2. 繪製長出來的大便螺旋 (隨著進度增加)
            const numBlobs = Math.floor(progress * 5); // 最多 500 顆球疊加出滑順的 3D 管狀
            for (let i = 0; i < numBlobs; i++) {
              const t = i / 500;
              const angle = t * Math.PI * 10; // 盤旋 5 圈
              const coilR = 80 * (1 - t); // 螺旋半徑越往上越小
              
              const px = centerX + Math.cos(angle) * coilR;
              // 加入一點正弦波讓便便有下垂的重力感，並往上長
              const py = centerY + 60 - (t * 220) + Math.sin(angle) * 12;
              
              const blobR = 50 * (1 - t * 0.75); // 管子本身的粗細越往上越細
              drawWaxSphere(px, py, blobR);
            }

            // 3. 繪製 ZBrush 專業雕刻筆刷游標
            if (mousePos.x > 0 || mousePos.y > 0) {
              ctx.beginPath();
              ctx.arc(mousePos.x, mousePos.y, 30, 0, Math.PI * 2);
              ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
              ctx.lineWidth = 1.5;
              ctx.stroke();
              
              ctx.beginPath();
              ctx.arc(mousePos.x, mousePos.y, 40, 0, Math.PI * 2);
              ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
              ctx.stroke();

              ctx.beginPath();
              ctx.arc(mousePos.x, mousePos.y, 2, 0, Math.PI * 2);
              ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
              ctx.fill();
            }
          }, [progress, mousePos]);

          // 塗抹交互邏輯
          const handlePointerDown = (e) => {
            setIsDragging(true);
            updateSculpt();
          };

          const handlePointerMove = (e) => {
            const rect = canvasRef.current.getBoundingClientRect();
            setMousePos({
              x: e.clientX - rect.left,
              y: e.clientY - rect.top
            });
            if (isDragging) updateSculpt();
          };

          const handlePointerUp = () => setIsDragging(false);

          const updateSculpt = () => {
            // 每塗抹一次，進度就增加，慢慢逼近 100% 完美大便
            setProgress(p => Math.min(100, p + 0.6));
          };

          const resetMesh = () => setProgress(0);

          return (
            <div className="w-full h-full flex flex-col bg-[#222] text-gray-300 font-sans select-none overflow-hidden text-xs">
              {/* 頂部工具列 */}
              <div className="h-10 bg-[#333] border-b border-[#111] flex items-center px-2 gap-4">
                <span className="font-bold text-orange-400 text-sm">CuteBrush 2026</span>
                <span className="hover:text-white cursor-pointer hidden sm:block">Alpha</span>
                <span className="hover:text-white cursor-pointer hidden sm:block">Brush</span>
                <span className="hover:text-white cursor-pointer hidden sm:block">Color</span>
                <span className="hover:text-white cursor-pointer hidden sm:block">Document</span>
                
                <div className="flex-1 flex justify-center items-center gap-4">
                  <div className="flex items-center gap-1">
                    <span>Draw Size</span>
                    <div className="w-24 h-1.5 bg-gray-600 rounded-full relative"><div className="w-1/3 h-full bg-orange-400 rounded-full"></div></div>
                    <span>64</span>
                  </div>
                  <div className="flex items-center gap-1 hidden sm:flex">
                    <span>Z Intensity</span>
                    <div className="w-20 h-1.5 bg-gray-600 rounded-full relative"><div className="w-1/2 h-full bg-orange-400 rounded-full"></div></div>
                    <span>50</span>
                  </div>
                </div>
              </div>

              <div className="flex-1 flex relative">
                {/* 左側筆刷列 */}
                <div className="w-14 bg-[#2a2a2a] border-r border-[#111] flex flex-col gap-2 p-1 items-center overflow-y-auto">
                  {['Std', 'Clay', 'Move', 'Dam', 'hPol', 'Inflat'].map((br, i) => (
                    <button key={i} className={`w-10 h-10 rounded shadow-sm border border-[#444] text-[10px] flex items-center justify-center font-bold hover:bg-[#444] transition-colors ${i===0 ? 'bg-[#444] text-orange-400' : 'bg-[#333]'}`}>
                      {br}
                    </button>
                  ))}
                </div>

                {/* 中央雕刻畫布 */}
                <div className="flex-1 relative cursor-crosshair">
                   <canvas 
                      ref={canvasRef}
                      className="absolute inset-0 w-full h-full touch-none"
                      onPointerDown={handlePointerDown}
                      onPointerMove={handlePointerMove}
                      onPointerUp={handlePointerUp}
                      onPointerLeave={handlePointerUp}
                   />
                   {/* 教學文字 */}
                   {progress === 0 && (
                     <div className="absolute top-1/4 left-1/2 -translate-x-1/2 text-gray-400 font-bold pointer-events-none animate-pulse drop-shadow-md text-sm">
                       請用滑鼠在球體上塗抹雕刻...
                     </div>
                   )}
                   {progress >= 100 && (
                     <div className="absolute top-10 left-1/2 -translate-x-1/2 text-orange-400 font-bold pointer-events-none drop-shadow-md bg-black/50 px-4 py-2 rounded-full border border-orange-500/50">
                       大師級傑作！無論怎麼雕刻，最終都會化為一坨大便。
                     </div>
                   )}
                </div>

                {/* 右側工具列 */}
                <div className="w-32 bg-[#2a2a2a] border-l border-[#111] flex flex-col p-2 gap-3 items-center">
                  <div className="w-full text-center text-gray-500 font-bold border-b border-[#444] pb-1 mb-1">Tool</div>
                  
                  {/* 假裝是目前工具的預覽 */}
                  <div className="w-20 h-20 bg-[#333] border-2 border-gray-500 rounded-lg flex items-center justify-center shadow-inner relative overflow-hidden">
                     {/* 簡單畫個深紅材質球當 Icon */}
                     <div className="w-14 h-14 rounded-full bg-gradient-to-br from-red-400 via-red-800 to-black shadow-lg"></div>
                  </div>
                  
                  <button onClick={resetMesh} className="w-full py-1 bg-[#444] hover:bg-orange-500 hover:text-white rounded border border-[#111] transition-colors mt-2">
                    Clear / 重置
                  </button>

                  <div className="w-full h-px bg-[#444] my-2"></div>
                  
                  <button className="w-12 h-10 bg-[#333] hover:bg-[#444] rounded border border-[#222] flex items-center justify-center text-xs">BPR</button>
                  <button className="w-12 h-10 bg-[#333] hover:bg-[#444] rounded border border-[#222] flex items-center justify-center text-xs">PolyF</button>
                  <button className="w-12 h-10 bg-[#444] text-orange-400 rounded border border-[#222] flex items-center justify-center text-xs font-bold shadow-inner">Persp</button>
                </div>
              </div>
            </div>
          );
