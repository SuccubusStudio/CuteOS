<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可愛版 Windows</title>
    
    <!-- 引入 Tailwind CSS (負責排版和美美的顏色) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 配置 Tailwind 支援手動切換深色模式 -->
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <!-- 引入 React 核心庫 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel (讓瀏覽器能看得懂 JSX 語法) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        /* 自訂滾動條讓它更可愛 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #64748b; }
        ::-webkit-scrollbar-thumb:hover { background: #f472b6; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Cute Hub 專用動畫 */
        @keyframes wiggle {
            0%, 100% { transform: rotate(-20deg); }
            50% { transform: rotate(20deg); }
        }
        .animate-wiggle { animation: wiggle 0.2s ease-in-out infinite; }
        
        @keyframes eat {
            0%, 100% { transform: scale(1) translateX(0); }
            50% { transform: scale(1.1) translateX(10px); }
        }
        .animate-eat { animation: eat 0.3s ease-in-out infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 內建圖標 (取代外部套件，確保本地執行沒問題) ---
        const IconStar = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>;
        const IconX = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const IconMinus = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconSquare = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>;
        const IconMenu = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>;
        const IconPower = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>;
        const IconClock = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const IconRotateCw = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>;
        const IconMoon = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>;
        const IconSun = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>;
        const IconLoader = ({ size = 24, className = "" }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} width={size} height={size}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;

        // --- 開機畫面 (Boot Sequence) ---
        const BiosScreen = ({ onEnterSetup, onContinue }) => {
          useEffect(() => {
            const timer = setTimeout(onContinue, 4000); // 開機畫面等久一點 (4秒)
            const handleKeyDown = (e) => {
              if (e.key === 'Delete' || e.key === 'Del') {
                clearTimeout(timer);
                onEnterSetup();
              }
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => {
              clearTimeout(timer);
              window.removeEventListener('keydown', handleKeyDown);
            };
          }, [onEnterSetup, onContinue]);

          return (
            <div 
              className="w-full h-screen bg-black text-white flex flex-col items-center justify-center font-mono select-none relative cursor-pointer"
              onClick={() => { onEnterSetup(); }} // 手機版或滑鼠可以直接點擊螢幕進入 BIOS
            >
              <div className="flex items-start gap-4">
                <IconStar size={48} className="text-yellow-400 fill-yellow-400" />
                <div>
                  <h1 className="text-4xl sm:text-6xl font-bold tracking-widest text-gray-200">CUTE MEGATRENDS</h1>
                  <p className="text-sm mt-2 text-gray-400">www.cute-ami.com</p>
                </div>
              </div>
              <div className="absolute bottom-12 text-gray-400 text-sm animate-pulse text-center">
                Press DEL to enter SETUP, ESC to skip memory test
                <div className="text-xs text-gray-600 mt-2">(手機版請直接點擊螢幕任意處進入 BIOS)</div>
              </div>
            </div>
          );
        };

        const BiosSetupScreen = ({ onExit }) => {
          const [exitPrompt, setExitPrompt] = useState(false);
          const [settings, setSettings] = useState({
            fluffyProcessor: 'Auto',
            pinkAesthetics: 'Enabled',
            virtualPetState: 'Active',
            bootDevice: 'CuteOS Drive'
          });
          const [activeIndex, setActiveIndex] = useState(0);
          const keys = Object.keys(settings);
          
          const labels = {
            fluffyProcessor: 'Fluffy Processor Speed',
            pinkAesthetics: 'Pink Aesthetics Driver',
            virtualPetState: 'Virtual Pet Mount State',
            bootDevice: 'First Boot Device'
          };

          const handleToggle = (key) => {
            const options = {
              fluffyProcessor: ['Auto', 'Overfluff (3.0GHz)', 'Underfluff (1.2GHz)'],
              pinkAesthetics: ['Enabled', 'Disabled', 'Maximum Pink'],
              virtualPetState: ['Active', 'Hibernation', 'Always Hungry'],
              bootDevice: ['CuteOS Drive', 'Floppy (1.44MB)', 'Network PXE']
            };
            const curr = settings[key];
            const idx = options[key].indexOf(curr);
            const next = options[key][(idx + 1) % options[key].length];
            setSettings({...settings, [key]: next});
          };

          useEffect(() => {
            const handleKeyDown = (e) => {
              if (exitPrompt) {
                if (e.key.toLowerCase() === 'y' || e.key.toLowerCase() === 'n' || e.key === 'Enter') onExit();
                if (e.key === 'Escape') setExitPrompt(false);
                return;
              }
              if (e.key === 'Escape' || e.key === 'F10') setExitPrompt(true);
              if (e.key === 'ArrowDown') setActiveIndex((i) => (i + 1) % keys.length);
              if (e.key === 'ArrowUp') setActiveIndex((i) => (i - 1 + keys.length) % keys.length);
              if (e.key === 'Enter' || e.key === ' ') handleToggle(keys[activeIndex]);
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [exitPrompt, activeIndex, settings, onExit]);

          return (
            <div className="w-full h-screen bg-[#0000AA] text-gray-200 font-mono select-none flex flex-col sm:text-base text-sm">
              <div className="bg-gray-200 text-[#0000AA] text-center font-bold py-1 px-4 flex justify-between shadow-sm">
                <span>CuteBIOS Setup Utility</span>
                <span>Advanced Cute Settings</span>
              </div>
              
              <div className="flex-1 flex flex-col sm:flex-row p-4 gap-4">
                <div className="flex-[2] border-2 border-double border-gray-400 p-4 space-y-2 relative">
                  {keys.map((k, i) => (
                    <div 
                      key={k} 
                      onClick={() => { setActiveIndex(i); handleToggle(k); }}
                      className={`flex justify-between cursor-pointer px-2 py-1 ${activeIndex === i ? 'bg-white text-[#0000AA]' : ''}`}
                    >
                      <span>{labels[k]}</span>
                      <span>[{settings[k]}]</span>
                    </div>
                  ))}

                  {/* 經典的離開存檔提示 */}
                  {exitPrompt && (
                    <div className="absolute inset-0 bg-black/50 flex items-center justify-center z-10">
                      <div className="bg-red-700 text-white border-2 border-gray-200 p-4 shadow-lg text-center max-w-sm">
                        <div className="mb-4 font-bold">Save configuration changes and exit now?</div>
                        <div className="mb-4 text-gray-300">[Y] Yes &nbsp;&nbsp;&nbsp; [N] No</div>
                        <div className="mt-4 flex justify-center gap-4">
                            <button onClick={onExit} className="bg-gray-300 text-black px-6 py-1 hover:bg-white font-bold transition-colors">Yes</button>
                            <button onClick={() => setExitPrompt(false)} className="bg-gray-300 text-black px-6 py-1 hover:bg-white font-bold transition-colors">No</button>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
                
                {/* 右側說明面板 */}
                <div className="flex-1 border-2 border-double border-gray-400 p-4 text-gray-300">
                  <div className="font-bold mb-2">Item Help</div>
                  <hr className="border-gray-500 mb-2"/>
                  {activeIndex === 0 && "Selects the fluffiness of the main processor.\n\nWarning: Overfluffing may cause excessive cuteness and overheating."}
                  {activeIndex === 1 && "Enable or disable the core pink aesthetics rendering engine."}
                  {activeIndex === 2 && "Configure the initial state of the virtual pet on system boot."}
                  {activeIndex === 3 && "Select the primary device to load CuteOS from."}
                </div>
              </div>

              <div className="border-t-2 border-gray-400 text-gray-400 p-2 flex flex-wrap gap-6 text-xs justify-center sm:justify-start">
                <span>↑↓: Move</span>
                <span>Enter: Change</span>
                <span>ESC: Exit</span>
                <span>F10: Save & Exit</span>
                <span className="ml-auto cursor-pointer border border-gray-500 px-3 py-1 hover:bg-gray-700 transition-colors" onClick={() => setExitPrompt(true)}>Save & Exit (Click)</span>
              </div>
            </div>
          );
        };

        const DosScreen = ({ onComplete }) => {
          const [lines, setLines] = useState([]);
          const bootMessages = [
            "CuteBIOS (C) 2026 Cute Megatrends, Inc.",
            "CPU: Fluffy Processor @ 2.4GHz",
            "Memory Test: 8388608K OK",
            "Initializing USB Controllers .. Done.",
            "Loading Pink Aesthetics Drivers ... OK",
            "Mounting Virtual Pet ... OK",
            "Starting CuteOS Core ...",
            "Welcome to CuteOS!"
          ];

          useEffect(() => {
            let currentLine = 0;
            const interval = setInterval(() => {
              if (currentLine < bootMessages.length) {
                setLines(prev => [...prev, bootMessages[currentLine]]);
                currentLine++;
              } else {
                clearInterval(interval);
                setTimeout(onComplete, 800); 
              }
            }, 300); 
            return () => clearInterval(interval);
          }, [onComplete]);

          return (
            <div className="w-full h-screen bg-black text-gray-300 font-mono p-4 select-none overflow-hidden text-sm sm:text-base">
              <div className="flex justify-between items-start mb-4">
                 <div className="flex items-center gap-2">
                   <IconStar size={24} className="text-yellow-400 fill-yellow-400" />
                   <span className="font-bold">Energy Star</span>
                 </div>
              </div>
              <div className="space-y-1">
                {lines.map((line, i) => (
                  <div key={i}>{line}</div>
                ))}
                <div className="animate-pulse inline-block">_</div>
              </div>
            </div>
          );
        };

        const WelcomeScreen = ({ isDarkMode }) => (
          <div className={`w-full h-screen flex flex-col items-center justify-center select-none transition-colors duration-500 ${isDarkMode ? 'bg-slate-900 text-white' : 'bg-pink-50 text-gray-700'}`}>
             <div className="w-24 h-24 bg-pink-200 dark:bg-slate-700 rounded-full flex items-center justify-center text-5xl shadow-md mb-6 animate-bounce">
                🐰
             </div>
             <h2 className="text-3xl font-bold mb-8">歡迎使用</h2>
             <IconLoader size={32} className="animate-spin text-pink-500 dark:text-pink-400" />
          </div>
        );

        const ShutdownScreen = ({ isDarkMode }) => (
          <div className={`w-full h-screen flex flex-col items-center justify-center select-none transition-colors duration-500 ${isDarkMode ? 'bg-slate-900 text-white' : 'bg-pink-50 text-gray-700'}`}>
             <IconLoader size={32} className="animate-spin text-pink-500 dark:text-pink-400 mb-6" />
             <h2 className="text-2xl font-bold">正在重新啟動...</h2>
          </div>
        );

        const BSODScreen = () => (
          <div className="w-full h-screen bg-[#0000AA] text-white font-mono p-8 sm:p-16 flex flex-col justify-center select-none cursor-none z-[9999] relative">
             <h1 className="text-6xl sm:text-8xl mb-8 font-bold">:(</h1>
             <p className="text-xl sm:text-3xl mb-8 leading-relaxed">
               您的可愛電腦遇到了一個致命的賣萌錯誤，必須重新啟動。<br/>
               我們正在收集錯誤資訊 (0%)
             </p>
             <p className="text-sm sm:text-base text-gray-300 mt-4">
               如果您想了解更多，可以稍後在網路上搜尋此錯誤代碼: CUTE_OVERLOAD_EXCEPTION<br/><br/>
               *** STOP: 0x000000C4 (0x0000000000000091, 0x000000000000000F, 0xFFFFF80002A3B5C8, 0x0000000000000000)<br/>
               *** Cute3D_Render_Engine.sys - Address FFFFF80002A3B5C8 base at FFFFF80002A3B000, DateStamp 60a4f5f5
             </p>
          </div>
        );

        // --- 各式小應用程式 (Apps) ---

        // 1. 記事本
        const AppNotepad = () => {
          return (
            <div className="w-full h-full flex flex-col bg-[#fff9fa] dark:bg-slate-800 transition-colors">
              <textarea 
                className="flex-1 w-full p-4 bg-transparent resize-none focus:outline-none font-sans text-gray-700 dark:text-gray-200 leading-relaxed placeholder-gray-400 dark:placeholder-gray-500"
                placeholder="在這裡寫下今天發生的可愛事情吧 (｡・ω・｡)ﾉ♡..."
                defaultValue="這是一個可愛的記事本！&#10;你可以把視窗拖來拖去喔～"
              />
            </div>
          );
        };

        // 2. 計算機
        const AppCalculator = () => {
          const [display, setDisplay] = useState('0');
          const [equation, setEquation] = useState('');

          const handleClick = (val) => {
            if (val === 'C') { setDisplay('0'); setEquation(''); return; }
            if (val === '=') {
              try {
                const result = new Function('return ' + equation + display)();
                setDisplay(String(result));
                setEquation('');
              } catch (e) {
                setDisplay('Error');
              }
              return;
            }
            if (['+', '-', '*', '/'].includes(val)) {
              setEquation(equation + display + val);
              setDisplay('0');
              return;
            }
            setDisplay(display === '0' ? val : display + val);
          };

          const buttons = ['C', '/', '*', '-', '7', '8', '9', '+', '4', '5', '6', '=', '1', '2', '3', '0', '.'];

          return (
            <div className="w-full h-full flex flex-col bg-pink-50 dark:bg-slate-800 p-4 font-mono transition-colors">
              <div className="bg-white dark:bg-slate-900 p-3 rounded-xl mb-4 text-right shadow-inner min-h-[4rem] flex flex-col justify-end transition-colors">
                <div className="text-gray-400 dark:text-gray-500 text-sm h-5">{equation}</div>
                <div className="text-3xl text-gray-700 dark:text-gray-200 font-bold overflow-hidden">{display}</div>
              </div>
              <div className="grid grid-cols-4 gap-2 flex-1">
                {buttons.map((btn, i) => (
                  <button 
                    key={i} 
                    onClick={() => handleClick(btn)}
                    className={`rounded-xl text-lg font-bold transition-transform active:scale-95 shadow-sm transition-colors
                      ${btn === '=' ? 'col-span-1 row-span-2 bg-pink-300 dark:bg-pink-600 text-white hover:bg-pink-400 dark:hover:bg-pink-500' : 
                        btn === '0' ? 'col-span-2 bg-white dark:bg-slate-700 text-gray-600 dark:text-gray-200 hover:bg-pink-100 dark:hover:bg-slate-600' : 
                        ['+','-','*','/','C'].includes(btn) ? 'bg-pink-200 dark:bg-slate-600 text-pink-800 dark:text-pink-300 hover:bg-pink-300 dark:hover:bg-slate-500' : 
                        'bg-white dark:bg-slate-700 text-gray-600 dark:text-gray-200 hover:bg-pink-100 dark:hover:bg-slate-600'}
                    `}
                    style={btn === '=' ? { gridRow: 'span 2' } : {}}
                  >
                    {btn}
                  </button>
                ))}
              </div>
            </div>
          );
        };

        // 3. 小畫家
        const AppPaint = () => {
          const canvasRef = useRef(null);
          const [isDrawing, setIsDrawing] = useState(false);
          const [color, setColor] = useState('#ff9a9e');

          useEffect(() => {
            const canvas = canvasRef.current;
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            const ctx = canvas.getContext('2d');
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = 5;
          }, []);

          useEffect(() => {
            if (canvasRef.current) {
              canvasRef.current.getContext('2d').strokeStyle = color;
            }
          }, [color]);

          const startDraw = (e) => {
            setIsDrawing(true);
            draw(e);
          };

          const endDraw = () => {
            setIsDrawing(false);
            if(canvasRef.current) canvasRef.current.getContext('2d').beginPath();
          };

          const draw = (e) => {
            if (!isDrawing) return;
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            
            ctx.lineTo(x - rect.left, y - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x - rect.left, y - rect.top);
          };

          const colors = ['#ff9a9e', '#fecfef', '#a1c4fd', '#fdcbf1', '#e0c3fc', '#4facfe', '#43e97b', '#333333'];

          return (
            <div className="w-full h-full flex flex-col bg-white dark:bg-slate-800 transition-colors">
              <div className="flex gap-2 p-2 bg-purple-50 dark:bg-slate-900 border-b border-purple-100 dark:border-slate-700 justify-center flex-wrap transition-colors">
                {colors.map(c => (
                  <button 
                    key={c} 
                    onClick={() => setColor(c)}
                    className={`w-6 h-6 sm:w-8 sm:h-8 rounded-full shadow-sm border-2 transition-transform hover:scale-110 ${color === c ? 'border-gray-500 dark:border-gray-300 scale-110' : 'border-transparent'}`}
                    style={{ backgroundColor: c }}
                  />
                ))}
                <button 
                  onClick={() => {
                    const canvas = canvasRef.current;
                    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                  }}
                  className="ml-auto px-3 py-1 bg-white dark:bg-slate-700 rounded-full text-xs text-purple-600 dark:text-purple-300 shadow-sm border border-purple-200 dark:border-slate-600 hover:bg-purple-100 dark:hover:bg-slate-600 transition-colors"
                >
                  清除
                </button>
              </div>
              <canvas 
                ref={canvasRef}
                onMouseDown={startDraw} onMouseMove={draw} onMouseUp={endDraw} onMouseLeave={endDraw}
                onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={endDraw}
                className="flex-1 w-full cursor-crosshair touch-none bg-white" 
              />
            </div>
          );
        };

        // 4. 小寵物
        const AppPet = () => {
          const [hunger, setHunger] = useState(80);
          const [happiness, setHappiness] = useState(80);
          const [status, setStatus] = useState('我在發呆...');

          const feed = () => {
            setHunger(prev => Math.min(100, prev + 20));
            setStatus('嚼嚼嚼... 好吃！🍓');
          };

          const play = () => {
            setHappiness(prev => Math.min(100, prev + 20));
            setHunger(prev => Math.max(0, prev - 10));
            setStatus('哇嗚～好玩！✨');
          };

          useEffect(() => {
            const timer = setInterval(() => {
              setHunger(prev => Math.max(0, prev - 2));
              setHappiness(prev => Math.max(0, prev - 2));
            }, 5000);
            return () => clearInterval(timer);
          }, []);

          let emotion = '🐹';
          if (happiness < 30 || hunger < 30) emotion = '🥺';

            { id: 'n3', type: 'sampler', x: 260, y: 80, title: '⚙️ K-Sampler', progress: 0 },

            { id: 'l1', source: 'n1', target: 'n3' },
            { id: 'l2', source: 'n2', target: 'n3' },
            { id: 'l3', source: 'n3', target: 'n4' }

          const [activeDrag, setActiveDrag] = useState(null);
          const [drawingLink, setDrawingLink] = useState(null);
          const [isGenerating, setIsGenerating] = useState(false);

            if (e.target.closest('button') || e.target.closest('textarea') || e.target.closest('.port')) return;
            const rect = containerRef.current.getBoundingClientRect();
            setActiveDrag({ type: 'node', id: n.id, offsetX: (e.clientX - rect.left) - n.x, offsetY: (e.clientY - rect.top) - n.y });
            e.currentTarget.setPointerCapture(e.pointerId);
          };

          const handlePointerMove = (e) => {
            if (!activeDrag) return;
            const rect = containerRef.current.getBoundingClientRect();
            const rx = e.clientX - rect.left;
            const ry = e.clientY - rect.top;

            if (activeDrag.type === 'node') {
              setNodes(ns => ns.map(n => n.id === activeDrag.id ? { ...n, x: rx - activeDrag.offsetX, y: ry - activeDrag.offsetY } : n));
            } else if (activeDrag.type === 'link') {
              setDrawingLink(prev => ({ ...prev, toX: rx, toY: ry }));
            }
          };

          const handlePointerUp = (e) => {
            if (activeDrag?.type === 'node') {
              e.currentTarget.releasePointerCapture(e.pointerId);
            }
            setActiveDrag(null);
            setDrawingLink(null);
          };

          const startDragLink = (e, sourceId) => {
            e.stopPropagation();
            const rect = containerRef.current.getBoundingClientRect();
            setActiveDrag({ type: 'link', sourceId });
            setDrawingLink({
              sourceId,
              fromX: e.clientX - rect.left,
              fromY: e.clientY - rect.top,
              toX: e.clientX - rect.left,
              toY: e.clientY - rect.top
            });
          };

          const finishDragLink = (e, targetId) => {
            e.stopPropagation();
            if (activeDrag?.type === 'link' && activeDrag.sourceId !== targetId) {
              setLinks(ls => [...ls, { id: 'l_' + Date.now(), source: activeDrag.sourceId, target: targetId }]);
            }
            setActiveDrag(null);
            setDrawingLink(null);
          };

          const deleteLink = (id) => setLinks(ls => ls.filter(l => l.id !== id));
          
          const cloneNode = (e, id) => {
            e.stopPropagation();
            const n = nodes.find(x => x.id === id);
            if (n) setNodes([...nodes, { ...n, id: 'n_' + Date.now(), x: n.x + 20, y: n.y + 20 }]);
          };

          const deleteNode = (e, id) => {
            e.stopPropagation();
            setNodes(ns => ns.filter(n => n.id !== id));
            setLinks(ls => ls.filter(l => l.source !== id && l.target !== id));
          };

            if (isGenerating) return;
            setIsGenerating(true);
            let p = 0;
            const interval = setInterval(() => {
              p += 10;
              setNodes(ns => ns.map(n => n.type === 'sampler' ? { ...n, progress: Math.min(p, 100) } : n));
              if (p >= 100) {
                clearInterval(interval);
                setIsGenerating(false);
                setNodes(ns => ns.map(n => {
                  if (n.type === 'sampler') return { ...n, progress: 0 };
                  if (n.type === 'output') {
                     const isAnimal = Math.random() > 0.5;
                     const seed = Math.random().toString(36).substring(7);
                     // 模擬 AI 產圖：隨機產生妹子頭像或是好笑的表情小動物
                     const url = isAnimal 
                        ? `https://api.dicebear.com/7.x/fun-emoji/svg?seed=${seed}`
                        : `https://api.dicebear.com/7.x/lorelei/svg?seed=${seed}`;
                     return { ...n, image: url };
                  }
                  return n;
                }));
              }

                  <path d={`M ${drawingLink.fromX} ${drawingLink.fromY} C ${drawingLink.fromX+50} ${drawingLink.fromY}, ${drawingLink.toX-50} ${drawingLink.toY}, ${drawingLink.toX} ${drawingLink.toY}`} 
                        fill="none" stroke="#ec4899" strokeWidth="4" strokeDasharray="5,5" className="opacity-50" />
                )}
              </svg>

              {nodes.map(n => (
                <div key={n.id} className="absolute w-[160px] bg-gray-800 rounded-xl shadow-2xl border border-gray-600 text-gray-200 flex flex-col z-10"
                     style={{ left: n.x, top: n.y }}>
                  <div className="bg-gray-700 p-2 rounded-t-xl flex justify-between items-center cursor-move" onPointerDown={(e) => handlePointerDownNode(e, n)}>
                    <span className="font-bold text-xs truncate flex-1 drop-shadow-md">{n.title}</span>
                    <div className="flex gap-1 ml-2">
                      <button onClick={(e) => cloneNode(e, n.id)} className="text-gray-400 hover:text-white" title="複製節點">📄</button>
                      <button onClick={(e) => deleteNode(e, n.id)} className="text-gray-400 hover:text-red-400" title="刪除節點">✕</button>
                    </div>
                  </div>
                  <div className="p-3 flex-1 flex flex-col gap-2 relative">
                    {n.type === 'prompt' && <textarea className="w-full bg-gray-900 text-gray-300 p-2 text-[10px] rounded-lg resize-none border border-gray-700 focus:border-pink-500 focus:outline-none" rows="3" defaultValue={n.text} />}
                    {n.type === 'sampler' && (
                      <div>
                        <div className="text-[10px] text-gray-400 mb-1">Steps: 20</div>
                        <div className="h-2 bg-gray-900 rounded-full overflow-hidden border border-gray-700">
                          <div className="h-full bg-pink-500 transition-all duration-300" style={{width: `${n.progress||0}%`}}/>
                        </div>
                      </div>
                    )}
                    {n.type === 'output' && (
                      <div className="w-full h-24 bg-gray-900 rounded-lg flex items-center justify-center text-gray-600 border border-gray-700 overflow-hidden relative">
                        {n.image ? <img src={n.image} className="w-full h-full object-cover bg-white" draggable="false" /> : <span className="text-[10px]">No Image</span>}
                      </div>
                    )}
                    {n.type === 'model' && <div className="text-[10px] text-pink-300 bg-pink-900/30 p-1 rounded text-center border border-pink-800/50">v1-5-pruned.ckpt</div>}
                  </div>

                  {n.type !== 'model' && <div className="port absolute -left-2 top-10 w-4 h-4 bg-blue-500 rounded-full border-2 border-gray-800 hover:scale-125 transition-transform z-20 shadow-md" onPointerUp={(e) => finishDragLink(e, n.id)} />}
                </div>
              ))}

              <div className="absolute right-4 top-4 bg-gray-800/90 backdrop-blur border border-gray-600 p-2 rounded-2xl shadow-2xl flex gap-2 z-30">
                 <button onClick={handleGenerate} disabled={isGenerating} className="px-6 py-2 bg-pink-600 hover:bg-pink-500 disabled:bg-gray-600 text-white text-sm font-bold rounded-xl shadow-lg transition-colors flex items-center gap-2">
                   {isGenerating ? '🔄 生成中...' : '✨ Queue Prompt'}
                 </button>
              </div>
              
              <div className="absolute left-4 bottom-4 text-gray-500 text-[10px] pointer-events-none">
                 提示：按住節點拖曳。雙擊連線可刪除。按 📄 可複製節點。
              </div>
            </div>
          );
        }

                              </div>
                              
                              {/* 播放器控制列 */}
                              <div className="absolute bottom-0 left-0 w-full p-2 bg-gradient-to-t from-black to-transparent flex items-center gap-3 text-xs text-gray-400 opacity-0 group-hover:opacity-100 transition-opacity">
                                  <span className="text-white text-lg cursor-pointer hover:text-[#ff9000]">⏸</span>
                                  <div className="flex-1 h-1.5 bg-gray-700 rounded-full cursor-pointer relative overflow-hidden">
                                      <div className="w-[30%] h-full bg-[#ff9000] rounded-full relative">
                                          <div className="absolute right-0 top-1/2 -translate-y-1/2 w-2 h-2 bg-white rounded-full shadow"></div>
                                      </div>
                                  </div>
                                  <span className="font-mono">01:23 / 04:56</span>
                                  <span className="cursor-pointer hover:text-white">⚙️</span>
                                  <span className="cursor-pointer hover:text-white">🔲</span>
                              </div>
                          </div>

                          {/* 影片資訊 */}
                          <div className="p-4 flex-1 overflow-y-auto">
                              <h2 className="text-lg sm:text-xl font-bold mb-2">{currentVid.title}</h2>
                              <div className="flex justify-between text-xs sm:text-sm text-gray-400 mb-4 border-b border-[#333] pb-4">
                                  <span className="text-[#ff9000] font-bold">👍 {currentVid.rating} <span className="text-gray-400 font-normal ml-2">{currentVid.views}</span></span>
                                  <span>上傳者: <span className="text-white hover:text-[#ff9000] cursor-pointer">{currentVid.author}</span></span>
                              </div>
                              <p className="text-gray-500 text-xs sm:text-sm">
                                  這是一部非常有教育意義的動物觀察影片。<br/>
                                  請準備好衛生紙（用來擦因為太可愛而流的鼻血）。
                              </p>
                          </div>
                      </div>
                  </div>
              );
          }

          return (
              <div className="w-full h-full bg-[#121212] text-white flex flex-col font-sans select-none">
                  {/* Header */}
                  <div className="flex items-center justify-between p-3 border-b border-[#333] bg-[#000]">
                      <div className="flex text-2xl font-bold cursor-pointer">
                          <span className="text-white">Cute</span>
                          <span className="bg-[#ff9000] text-black px-1 ml-1 rounded-md tracking-tighter">Hub</span>
                      </div>
                      <div className="flex items-center gap-3 sm:gap-4 text-xs sm:text-sm font-bold text-gray-400">
                          <span className="text-white cursor-pointer hover:text-[#ff9000]">首頁</span>
                          <span className="cursor-pointer hover:text-[#ff9000]">影片</span>
                          <span className="cursor-pointer hover:text-[#ff9000]">類別</span>
                      </div>
                  </div>
                  
                  {/* Content */}
                  <div className="flex-1 p-4 overflow-y-auto">
                      <h3 className="text-lg font-bold mb-4 flex items-center gap-2">🔥 熱門兔兔</h3>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                          {videos.map(v => (
                              <div key={v.id} className="cursor-pointer group" onClick={() => { setCurrentVid(v); setPhase('watch'); }}>
                                  <div className="w-full aspect-video bg-[#222] rounded-lg mb-2 flex items-center justify-center text-6xl group-hover:ring-2 ring-[#ff9000] transition-all relative overflow-hidden shadow-lg">
                                      <span className="group-hover:scale-125 transition-transform duration-300">{v.thumbEmoji}</span>
                                      <div className="absolute bottom-1 right-1 bg-black/80 px-1 text-[10px] rounded font-mono text-white">04:56</div>
                                  </div>
                                  <h4 className="font-bold text-sm text-gray-200 group-hover:text-white line-clamp-2">{v.title}</h4>
                                  <div className="flex justify-between text-xs text-gray-500 mt-1">
                                      <span className="hover:text-gray-300">{v.author}</span>
                                  </div>
                                  <div className="flex justify-between text-[10px] text-gray-500 mt-1">
                                      <span>{v.views}</span>
                                      <span className="text-[#ff9000] font-bold">{v.rating}</span>
                                  </div>
                              </div>
                          ))}
                      </div>
                  </div>
              </div>
          );
        };

        // 8. Cute3D (專業建模軟體)
        const AppCute3D = () => {
          const [objects, setObjects] = useState([
             { id: 'init', emoji: '🧊', x: 45, y: 40 }
          ]);
          const [rendering, setRendering] = useState(false);
          const [buckets, setBuckets] = useState([]);

          const addObj = (emoji) => {
            setObjects([...objects, { id: Date.now(), emoji, x: Math.random()*70 + 10, y: Math.random()*70 + 10 }]);
          };

          const handleRender = () => {
            setRendering(true);
            setBuckets([]);
            let b = [];
            // 模擬格子渲染 (Bucket Rendering)
            const timer = setInterval(() => {
              b.push(b.length);
              setBuckets([...b]);
              // 渲染到第9格 (約 2.5 秒) 直接發送藍白畫面事件！
              if (b.length > 8) {
                clearInterval(timer);
                window.dispatchEvent(new CustomEvent('os-bsod'));
              }
            }, 300);
          };

          return (
            <div className="w-full h-full flex flex-col bg-gray-100 dark:bg-slate-800 transition-colors select-none font-sans overflow-hidden">
              {/* 工具列 */}
              <div className="flex gap-2 p-2 bg-gray-200 dark:bg-slate-700 border-b border-gray-300 dark:border-slate-600 z-20">
                <button onClick={() => addObj('🧊')} className="p-2 bg-white dark:bg-slate-600 text-gray-700 dark:text-gray-200 rounded hover:bg-pink-100 dark:hover:bg-pink-900 shadow-sm transition-colors text-sm font-bold flex items-center gap-1">🧊 <span className="hidden sm:inline">方塊</span></button>
                <button onClick={() => addObj('🔺')} className="p-2 bg-white dark:bg-slate-600 text-gray-700 dark:text-gray-200 rounded hover:bg-pink-100 dark:hover:bg-pink-900 shadow-sm transition-colors text-sm font-bold flex items-center gap-1">🔺 <span className="hidden sm:inline">錐體</span></button>
                <button onClick={() => addObj('🍩')} className="p-2 bg-white dark:bg-slate-600 text-gray-700 dark:text-gray-200 rounded hover:bg-pink-100 dark:hover:bg-pink-900 shadow-sm transition-colors text-sm font-bold flex items-center gap-1">🍩 <span className="hidden sm:inline">甜甜圈</span></button>
                <div className="flex-1" />
                <button onClick={handleRender} disabled={rendering} className="px-4 py-2 bg-blue-500 hover:bg-blue-600 disabled:bg-gray-400 text-white text-sm font-bold rounded shadow-sm transition-colors flex items-center gap-2">
                   {rendering ? '🔄 渲染中...' : '📷 Render'}
                </button>
              </div>
              
              {/* 3D 視圖區 */}
              <div className="flex-1 relative bg-[#e5e5f7] dark:bg-[#1a1a2e]" style={{ backgroundImage: 'linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.1) 1px, transparent 1px)', backgroundSize: '20px 20px' }}>
                 {/* 網格裝飾 */}
                 <div className="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20 dark:opacity-40">
                     <div className="w-48 h-48 border-[3px] border-dashed border-gray-500 rounded-full animate-[spin_10s_linear_infinite]"></div>
                 </div>

                 {/* 放置的物件 */}
                 {objects.map(obj => (
                   <div key={obj.id} className="absolute text-6xl hover:scale-110 transition-transform drop-shadow-[0_10px_10px_rgba(0,0,0,0.3)] z-10" style={{ left: `${obj.x}%`, top: `${obj.y}%` }}>
                      {obj.emoji}
                   </div>
                 ))}

                 {/* 渲染進度覆蓋層 (格子動畫) */}
                 {rendering && (
                   <div className="absolute inset-0 bg-black/80 z-30 grid grid-cols-4 grid-rows-3">
                      {Array.from({length: 12}).map((_, i) => (
                        <div key={i} className={`w-full h-full border border-orange-500/20 transition-colors duration-75 relative ${buckets.includes(i) ? 'bg-transparent border-orange-500' : 'bg-black'}`}>
                           {/* 正在渲染那一格顯示橘色外框 */}
                           {buckets.length === i && <div className="absolute inset-0 border-2 border-orange-400 animate-pulse bg-orange-400/20" />}
                        </div>
                      ))}
                   </div>
                 )}
              </div>
            </div>
          )
        };

        // --- 系統核心配置 (使用 Emoji 代替原本的圖標組件) ---
        const APPS = {
          notepad: { id: 'notepad', title: '記事本', icon: '📝', component: AppNotepad, width: 400, height: 300 },
          calculator: { id: 'calculator', title: '計算機', icon: '🧮', component: AppCalculator, width: 300, height: 400 },
          paint: { id: 'paint', title: '小畫家', icon: '🎨', component: AppPaint, width: 450, height: 350 },
          pet: { id: 'pet', title: '小寵物', icon: '🐹', component: AppPet, width: 350, height: 400 },
          comfy: { id: 'comfy', title: 'CuteUI', icon: '🪄', component: AppComfyUI, width: 650, height: 450 },
          taskmgr: { id: 'taskmgr', title: '工作管理員', icon: '📈', component: AppTaskManager, width: 750, height: 500 },
          cutehub: { id: 'cutehub', title: 'Cute Hub', icon: '🟧', component: AppCuteHub, width: 600, height: 450 },
          cute3d: { id: 'cute3d', title: 'Cute3D', icon: '🧊', component: AppCute3D, width: 550, height: 400 },
        };

        // --- 視窗元件 ---
        const Window = ({ win, app, onClose, onFocus, onUpdatePos, isFocused }) => {
          const [isDragging, setIsDragging] = useState(false);
          const [rel, setRel] = useState({ x: 0, y: 0 });
          const [isMaximized, setIsMaximized] = useState(false);

          const onPointerDown = (e) => {
            if (e.target.closest('.window-controls')) return;
            onFocus(win.id);
            setIsDragging(true);
            setRel({ x: e.clientX - win.x, y: e.clientY - win.y });
            e.currentTarget.setPointerCapture(e.pointerId);
          };

          const onPointerMove = (e) => {
            if (!isDragging || isMaximized) return;
            onUpdatePos(win.id, { x: e.clientX - rel.x, y: e.clientY - rel.y });
          };

          const onPointerUp = (e) => {
            setIsDragging(false);
            e.currentTarget.releasePointerCapture(e.pointerId);
          };

          const AppContent = app.component;

          return (
            <div
              className={`absolute flex flex-col bg-white/80 dark:bg-slate-800/80 backdrop-blur-md rounded-2xl shadow-2xl border ${isFocused ? 'border-pink-300 dark:border-pink-500 shadow-pink-200/50 dark:shadow-pink-900/50' : 'border-white/50 dark:border-slate-600/50'} overflow-hidden transition-all duration-200`}
              style={{
                left: isMaximized ? 0 : win.x,
                top: isMaximized ? 0 : win.y,
                width: isMaximized ? '100%' : app.width,
                height: isMaximized ? 'calc(100% - 3.5rem)' : app.height,
                zIndex: win.zIndex,
                display: win.minimized ? 'none' : 'flex'
              }}
              onClick={() => onFocus(win.id)}
            >
              <div 
                className="h-10 bg-gradient-to-r from-white/60 to-white/30 dark:from-slate-700/60 dark:to-slate-700/30 border-b border-white/40 dark:border-slate-600/50 flex items-center justify-between px-3 cursor-move select-none transition-colors"
                onPointerDown={onPointerDown}
                onPointerMove={onPointerMove}
                onPointerUp={onPointerUp}
                onDoubleClick={() => setIsMaximized(!isMaximized)}
              >
                <div className="flex items-center gap-2">
                  <div className="w-6 h-6 flex items-center justify-center text-lg">{app.icon}</div>
                  <span className="text-sm font-bold text-gray-700 dark:text-gray-200">{app.title}</span>
                </div>
                <div className="flex items-center gap-2 window-controls">
                  <button onClick={(e) => { e.stopPropagation(); toggleMinimize(win.id); }} className="w-6 h-6 flex items-center justify-center rounded-full hover:bg-gray-200/50 dark:hover:bg-slate-600 text-gray-600 dark:text-gray-300 transition-colors">
                    <IconMinus size={14} />
                  </button>
                  <button onClick={(e) => { e.stopPropagation(); setIsMaximized(!isMaximized); }} className="w-6 h-6 flex items-center justify-center rounded-full hover:bg-gray-200/50 dark:hover:bg-slate-600 text-gray-600 dark:text-gray-300 transition-colors">
                    <IconSquare size={12} />
                  </button>
                  <button onClick={(e) => { e.stopPropagation(); onClose(win.id); }} className="w-6 h-6 flex items-center justify-center rounded-full hover:bg-red-400 dark:hover:bg-red-500 hover:text-white text-gray-600 dark:text-gray-300 transition-colors">
                    <IconX size={14} />
                  </button>
                </div>
              </div>
              <div className="flex-1 overflow-hidden relative">
                <AppContent />
              </div>
            </div>
          );
        };

        // --- 主系統 ---
        const CuteOS = () => {
          const [bootPhase, setBootPhase] = useState('bios'); 
          const [showPowerMenu, setShowPowerMenu] = useState(false);
          const [windows, setWindows] = useState([]);
          const [zIndexCounter, setZIndexCounter] = useState(10);
          const [startOpen, setStartOpen] = useState(false);
          const [time, setTime] = useState(new Date());
          const [isDarkMode, setIsDarkMode] = useState(false);

          // 監聽藍白畫面事件
          useEffect(() => {
            const handleBSOD = () => setBootPhase('bsod');
            window.addEventListener('os-bsod', handleBSOD);
            return () => window.removeEventListener('os-bsod', handleBSOD);
          }, []);

          // 移除原本在這裡的倒數計時 useEffect，現在由 BiosScreen 自己管理

          useEffect(() => {
            if (bootPhase === 'shutdown') {
              const timer = setTimeout(() => setBootPhase('bios'), 3000);
              return () => clearTimeout(timer);
            }
            if (bootPhase === 'welcome') {
              const timer = setTimeout(() => setBootPhase('os'), 2500);
              return () => clearTimeout(timer);
            }
            if (bootPhase === 'bsod') {
              setWindows([]); // 清空所有視窗 (模擬系統當機記憶體清空)
              setStartOpen(false);
              const timer = setTimeout(() => setBootPhase('shutdown'), 4500); // 停在藍白畫面 4.5 秒後重啟
              return () => clearTimeout(timer);
            }
          }, [bootPhase]);

          const handleRestart = () => {
            setBootPhase('shutdown');
            setWindows([]);
            setStartOpen(false);
            setShowPowerMenu(false);
          };

          useEffect(() => {
            const timer = setInterval(() => setTime(new Date()), 60000);
            return () => clearInterval(timer);
          }, []);

          const openApp = (appId) => {
            setStartOpen(false);
            const existingWin = windows.find(w => w.appId === appId);
            if (existingWin) {
              focusWindow(existingWin.id);
              if (existingWin.minimized) {
                setWindows(windows.map(w => w.id === existingWin.id ? { ...w, minimized: false } : w));
              }
              return;
            }

            const newZ = zIndexCounter + 1;
            setZIndexCounter(newZ);
            const offset = (windows.length % 5) * 30;
            // 讓視窗不會超出邊界太多
            const startX = Math.min(50 + offset, window.innerWidth - 300);
            const startY = Math.min(50 + offset, window.innerHeight - 300);

            setWindows([...windows, {
              id: `win_${Date.now()}`,
              appId,
              x: startX,
              y: startY,
              zIndex: newZ,
              minimized: false
            }]);
          };

          const closeWindow = (id) => {
            setWindows(windows.filter(w => w.id !== id));
          };

          const focusWindow = (id) => {
            const newZ = zIndexCounter + 1;
            setZIndexCounter(newZ);
            setWindows(windows.map(w => w.id === id ? { ...w, zIndex: newZ } : w));
          };

          const updateWindowPos = (id, pos) => {
            setWindows(windows.map(w => w.id === id ? { ...w, x: pos.x, y: pos.y } : w));
          };

          const toggleMinimize = (id) => {
            setWindows(windows.map(w => w.id === id ? { ...w, minimized: !w.minimized } : w));
            if (!windows.find(w => w.id === id).minimized) {
              focusWindow(id);
            }
          };

          const highestZIndex = Math.max(...windows.map(w => w.zIndex), 0);

          return (
            <div className={isDarkMode ? 'dark' : ''}>
              {bootPhase === 'bios' && <BiosScreen onEnterSetup={() => setBootPhase('bios-setup')} onContinue={() => setBootPhase('dos')} />}
              {bootPhase === 'bios-setup' && <BiosSetupScreen onExit={() => setBootPhase('dos')} />}
              {bootPhase === 'dos' && <DosScreen onComplete={() => setBootPhase('welcome')} />}
              {bootPhase === 'welcome' && <WelcomeScreen isDarkMode={isDarkMode} />}
              {bootPhase === 'shutdown' && <ShutdownScreen isDarkMode={isDarkMode} />}
              {bootPhase === 'bsod' && <BSODScreen />}
              
              {bootPhase === 'os' && (
                <div className="w-full h-screen overflow-hidden bg-gradient-to-br from-indigo-100 via-purple-100 to-pink-100 dark:from-slate-900 dark:via-indigo-950 dark:to-fuchsia-950 relative font-sans select-none flex flex-col transition-colors duration-500">
                  
                  <div className="flex-1 relative p-4" onClick={() => { setStartOpen(false); setShowPowerMenu(false); }}>
                    <div className="absolute inset-4 flex flex-col gap-4 flex-wrap content-start z-0">
                      {Object.values(APPS).map(app => (
                        <button 
                          key={app.id} 
                          onDoubleClick={() => openApp(app.id)}
                          onClick={() => openApp(app.id)} 
                          className="w-20 p-2 flex flex-col items-center gap-2 rounded-xl hover:bg-white/30 dark:hover:bg-slate-800/50 transition-colors group"
                        >
                          <div className="w-12 h-12 bg-white/60 dark:bg-slate-800/60 backdrop-blur-sm rounded-2xl shadow-sm flex items-center justify-center group-hover:scale-105 transition-all text-2xl border border-transparent dark:border-slate-700/50">
                            {app.icon}
                          </div>
                          <span className="text-xs font-bold text-gray-700 dark:text-gray-200 text-center drop-shadow-sm transition-colors">{app.title}</span>
                        </button>
                      ))}
                    </div>

                    {windows.map(win => (
                      <Window 
                        key={win.id} 
                        win={win} 
                        app={APPS[win.appId]}
                        onClose={closeWindow}
                        onFocus={focusWindow}
                        onUpdatePos={updateWindowPos}
                        isFocused={win.zIndex === highestZIndex && !win.minimized}
                      />
                    ))}
                  </div>

                  {startOpen && (
                    <div className="absolute bottom-16 left-4 w-64 bg-white/90 dark:bg-slate-800/90 backdrop-blur-xl rounded-2xl shadow-2xl border border-white/50 dark:border-slate-700 p-4 z-50 animate-in fade-in duration-200 transition-colors">
                      <div className="flex items-center gap-3 mb-6 pb-4 border-b border-gray-100 dark:border-slate-700">
                        <div className="w-10 h-10 bg-pink-100 dark:bg-slate-700 rounded-full flex items-center justify-center text-xl shadow-sm transition-colors">
                          🐰
                        </div>
                        <div>
                          <div className="font-bold text-gray-700 dark:text-gray-200">小主人</div>
                          <div className="text-xs text-gray-400 dark:text-gray-400">可愛每一天 ✨</div>
                        </div>
                      </div>
                      <div className="space-y-1">
                        {Object.values(APPS).map(app => (
                          <button 
                            key={app.id} 
                            onClick={() => openApp(app.id)}
                            className="w-full flex items-center gap-3 p-2 rounded-xl hover:bg-pink-50 dark:hover:bg-slate-700 transition-colors text-left"
                          >
                            <div className="w-8 h-8 bg-white dark:bg-slate-600 rounded-lg shadow-sm flex items-center justify-center text-lg transition-colors">
                              {app.icon}
                            </div>
                            <span className="text-sm font-bold text-gray-600 dark:text-gray-200">{app.title}</span>
                          </button>
                        ))}
                      </div>
                      <div className="mt-4 pt-4 border-t border-gray-100 dark:border-slate-700 flex justify-between relative transition-colors items-center">
                        <button 
                          onClick={(e) => { e.stopPropagation(); setIsDarkMode(!isDarkMode); }}
                          className="p-2 rounded-full hover:bg-indigo-50 dark:hover:bg-slate-700 text-indigo-400 dark:text-yellow-400 transition-colors" 
                          title="切換深色/淺色模式"
                        >
                          {isDarkMode ? <IconSun size={18} /> : <IconMoon size={18} />}
                        </button>

                        <div className="flex relative">
                          {showPowerMenu && (
                            <div className="absolute bottom-12 right-0 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 shadow-xl rounded-xl p-2 z-50 transition-colors">
                              <button 
                                onClick={handleRestart}
                                className="flex items-center gap-2 px-4 py-2 hover:bg-red-50 dark:hover:bg-slate-700 text-red-500 dark:text-red-400 rounded-lg transition-colors whitespace-nowrap text-sm font-bold"
                              >
                                <IconRotateCw size={16} />
                                重新啟動
                              </button>
                            </div>
                          )}
                          <button 
                            onClick={(e) => { e.stopPropagation(); setShowPowerMenu(!showPowerMenu); }}
                            className="p-2 rounded-full hover:bg-red-50 dark:hover:bg-slate-700 text-red-400 transition-colors" 
                            title="電源"
                          >
                            <IconPower size={18} />
                          </button>
                        </div>
                      </div>
                    </div>
                  )}

                  <div className="h-14 bg-white/60 dark:bg-slate-900/60 backdrop-blur-xl border-t border-white/50 dark:border-slate-800 flex items-center px-4 justify-between z-40 relative shadow-[0_-4px_20px_rgba(0,0,0,0.05)] transition-colors">
                    <div className="flex items-center gap-2 overflow-x-auto overflow-y-hidden no-scrollbar pr-2">
                      <button 
                        onClick={(e) => { e.stopPropagation(); setStartOpen(!startOpen); setShowPowerMenu(false); }}
                        className={`flex-shrink-0 w-10 h-10 rounded-xl flex items-center justify-center transition-all ${startOpen ? 'bg-pink-200 dark:bg-slate-700 text-pink-700 dark:text-pink-300 shadow-inner' : 'bg-white dark:bg-slate-800 text-pink-500 dark:text-pink-400 hover:bg-pink-50 dark:hover:bg-slate-700 shadow-sm hover:-translate-y-0.5'}`}
                      >
                        <IconMenu size={20} />
                      </button>

                      <div className="flex items-center gap-2 ml-4">
                        {windows.map(win => {
                          const app = APPS[win.appId];
                          const isActive = win.zIndex === highestZIndex && !win.minimized;
                          return (
                            <button
                              key={win.id}
                              onClick={() => toggleMinimize(win.id)}
                              className={`flex-shrink-0 flex items-center gap-2 px-3 py-1.5 rounded-xl transition-all max-w-[120px] ${isActive ? 'bg-white dark:bg-slate-700 shadow-md text-pink-600 dark:text-pink-300 scale-100' : 'bg-white/40 dark:bg-slate-800/60 text-gray-600 dark:text-gray-400 hover:bg-white/60 dark:hover:bg-slate-700/80 scale-95'}`}
                            >
                              <div className="w-5 h-5 flex-shrink-0 flex items-center justify-center text-sm">
                                 <span className={isActive ? '' : 'grayscale opacity-70'}>{app.icon}</span>
                              </div>
                              <span className="text-sm font-bold truncate">{app.title}</span>
                              {isActive && <div className="absolute -bottom-1 left-1/2 -translate-x-1/2 w-3 h-1 bg-pink-400 rounded-full" />}
                            </button>
                          );
                        })}
                      </div>
                    </div>

                    <div className="flex-shrink-0 flex items-center gap-3 px-3 py-1.5 bg-white/50 dark:bg-slate-800/80 rounded-xl shadow-sm text-gray-600 dark:text-gray-300 text-sm font-bold ml-2 transition-colors">
                      <IconClock size={16} className="text-pink-400 hidden sm:block" />
                      {time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                    </div>
                  </div>

                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CuteOS />);
    </script>
</body>
